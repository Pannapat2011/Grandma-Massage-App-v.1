<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baan Prakob Thong - Luxury POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #C5A059;
            --secondary: #996515;
            --bg: #FDFBF8;
            --card: rgba(255, 255, 255, 0.9);
            --text: #4A4A4A;
            --shadow: 0 8px 32px 0 rgba(197, 160, 89, 0.15);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #F4EBD0, transparent), radial-gradient(circle at bottom left, #F4EBD0, transparent);
            margin: 0;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 🔒 Login UI */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 40px;
            width: 80%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            margin-bottom: 30px;
        }

        /* 🏠 Header UI */
        .brand-header {
            text-align: center;
            padding: 30px 0;
        }

        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin: 0;
            color: var(--secondary);
            letter-spacing: 2px;
        }

        /* 💰 Dashboard Card */
        .summary-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(197, 160, 89, 0.05), transparent);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .summary-card h2 {
            font-size: 48px;
            margin: 10px 0;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔘 Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-item {
            background: var(--card);
            padding: 25px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.2);
        }

        .menu-item span {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }

        /* 📄 Sub-Page UI */
        .page {
            display: none;
            background: var(--card);
            padding: 30px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, select, button.btn-gold {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border-radius: 20px;
            border: 1px solid #EFEAE2;
            background: #F9F7F2;
            font-size: 16px;
            font-family: 'Sarabun';
            box-sizing: border-box;
            outline: none;
        }

        button.btn-gold {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(153, 101, 21, 0.2);
            cursor: pointer;
        }

        .list-item {
            background: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 12px;
            border: 1px solid #F0EDE7;
            text-align: left;
        }

        /* 📱 QR Display */
        #qr-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        #qr-img {
            width: 200px;
            border-radius: 15px;
            border: 4px solid #FDFBF8;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1 style="font-family: 'Playfair Display'; color: #C5A059; margin:0;">BPT</h1>
        <h2>Premium Access</h2>
        <input type="password" id="login-pass" style="text-align:center; letter-spacing: 10px;" placeholder="••••••">
        <button class="btn-gold" onclick="auth()">เข้าสู่ระบบงาน</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="brand-header">
            <h1>BAAN PRAKOB THONG</h1>
            <small style="color:#C5A059; letter-spacing: 3px;">THAILAND SPA & MASSAGE</small>
        </div>

        <div class="summary-card">
            <small style="text-transform: uppercase; letter-spacing: 1px;">ยอดรายได้วันนี้</small>
            <h2 id="total-val">฿0</h2>
            <div style="display:flex; justify-content: space-around; font-size:12px; opacity: 0.6;">
                <span>สะสมแต้ม: <b id="point-total">0</b></span>
                <span>คิวที่รอ: <b id="wait-total">0</b></span>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('p-queue')"><span>📅</span><strong>จองคิว</strong></div>
            <div class="menu-item" onclick="openPage('p-pay')"><span>💳</span><strong>ชำระเงิน</strong></div>
            <div class="menu-item" onclick="openPage('p-verify')"><span>🔍</span><strong>เช็คยอด</strong></div>
            <div class="menu-item" onclick="openPage('p-member')"><span>💎</span><strong>สมาชิก</strong></div>
            <div class="menu-item" onclick="openPage('p-stock')"><span>📦</span><strong>สต็อก</strong></div>
            <div class="menu-item" onclick="openPage('p-stat')"><span>📊</span><strong>รายงาน</strong></div>
        </div>
        
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#ccc; width:100%; margin-top:30px; font-size:10px;">RESET SYSTEM</button>
    </div>

    <div id="p-queue" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Queue Booking</h3>
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="q-price" placeholder="ค่าบริการ">
        <div style="display:flex; gap:10px;"><input type="time" id="q-s"><input type="time" id="q-e"></div>
        <button class="btn-gold" onclick="addQ()">ยืนยันการจอง</button>
        <div id="q-list" style="margin-top:20px;"></div>
        <button class="btn-back" onclick="openPage('home')">ย้อนกลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Payment</h3>
        <select id="pay-select" onchange="autoPay()"></select>
        <input type="text" id="pay-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="pay-amt" placeholder="0.00" oninput="genQR()" style="font-size:32px; text-align:center; background:none; border:none; border-bottom: 2px solid var(--primary); border-radius:0;">
        
        <div id="qr-box">
            <img id="qr-img" src="">
            <p style="font-size:11px; color:#999; margin-top:10px;">SCAN PROMPTPAY: 086-352-6387</p>
        </div>

        <button class="btn-gold" onclick="submitPay()" style="margin-top:20px;">แจ้งชำระเงิน</button>
        <button class="btn-back" onclick="openPage('home')">ยกเลิก</button>
    </div>

    <div id="p-verify" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Verification</h3>
        <div id="v-list"></div>
        <button class="btn-back" onclick="openPage('home')">ย้อนกลับ</button>
    </div>

    <div id="p-member" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Members</h3>
        <input type="text" id="m-phone" placeholder="เบอร์โทรศัพท์">
        <button class="btn-gold" onclick="searchMember()">ค้นหาสมาชิก</button>
        <div id="m-result" style="margin-top:20px;"></div>
        <button class="btn-back" onclick="openPage('home')">ย้อนกลับ</button>
    </div>

    <div id="p-stock" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Inventory</h3>
        <div id="stock-list"></div>
        <button class="btn-back" onclick="openPage('home')">ย้อนกลับ</button>
    </div>

    <div id="p-stat" class="page">
        <h3 style="font-family:'Playfair Display'; color:var(--secondary);">Daily Report</h3>
        <div id="stat-content"></div>
        <button class="btn-gold" onclick="exportSheet()" style="background:#2E7D32;">SEND TO GOOGLE SHEETS</button>
        <button class="btn-back" onclick="openPage('home')">ย้อนกลับ</button>
    </div>
</div>

<script>
    let db = {
        total: parseInt(localStorage.getItem('bpt_total')) || 0,
        queues: JSON.parse(localStorage.getItem('bpt_queues')) || [],
        wait: JSON.parse(localStorage.getItem('bpt_wait')) || [],
        members: JSON.parse(localStorage.getItem('bpt_members')) || {},
        history: JSON.parse(localStorage.getItem('bpt_history')) || [],
        stock: JSON.parse(localStorage.getItem('bpt_stock')) || [
            {n:"น้ำมันนวด", q:10, u:"ขวด"}, {n:"ลูกประคบ", q:25, u:"ลูก"}, {n:"ผ้าขนหนู", q:50, u:"ผืน"}
        ]
    };

    function auth() { if(document.getElementById('login-pass').value==='123456') { document.getElementById('login-overlay').style.display='none'; document.getElementById('app').style.display='block'; updateUI(); } }
    function openPage(id) { document.getElementById('home').style.display='none'; document.querySelectorAll('.page').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; if(id==='p-queue')renderQ(); if(id==='p-pay')updateDrop(); if(id==='p-verify')renderV(); if(id==='p-stat')renderStat(); if(id==='p-stock')renderStock(); }
    function updateUI() { document.getElementById('total-val').innerText=`฿${db.total.toLocaleString()}`; document.getElementById('wait-total').innerText=db.wait.length; }

    // Logic: QR
    function genQR() {
        let a = document.getElementById('pay-amt').value;
        if(a > 0) {
            document.getElementById('qr-img').src = `https://promptpay.io/0863526387/${a}.png?t=${Date.now()}`;
            document.getElementById('qr-box').style.display='block';
        } else document.getElementById('qr-box').style.display='none';
    }

    // Logic: Queue
    function addQ() {
        let n=document.getElementById('q-name').value, p=document.getElementById('q-price').value, s=document.getElementById('q-s').value, e=document.getElementById('q-e').value;
        if(!n||!p||!s||!e) return;
        db.queues.push({id:Date.now(), n, p, s, e}); save(); renderQ();
    }
    function renderQ() {
        let l=document.getElementById('q-list'); l.innerHTML='';
        db.queues.forEach(q => { l.innerHTML+=`<div class="list-item"><strong>${q.s}-${q.e}</strong><br>${q.n} (฿${q.p}) <span onclick="delQ(${q.id})" style="float:right;color:red;cursor:pointer;">×</span></div>`; });
    }
    function delQ(id) { db.queues=db.queues.filter(x=>x.id!==id); save(); renderQ(); }

    // Logic: Payment
    function updateDrop() {
        let s = document.getElementById('pay-select'); s.innerHTML='<option value="">-- เลือกรายการคนจอง --</option>';
        db.queues.forEach(q => s.innerHTML+=`<option value="${q.id}">${q.n}</option>`);
    }
    function autoPay() { let id=document.getElementById('pay-select').value; if(!id)return; let q=db.queues.find(x=>x.id==id); document.getElementById('pay-name').value=q.n; document.getElementById('pay-amt').value=q.p; genQR(); }
    function submitPay() {
        let a=parseInt(document.getElementById('pay-amt').value), n=document.getElementById('pay-name').value, qId=document.getElementById('pay-select').value;
        if(!a||!n) return;
        db.wait.push({id:Date.now(), n, a, qId});
        if(qId) db.queues=db.queues.filter(x=>x.id!=qId);
        save(); openPage('home'); updateUI();
    }

    // Logic: Verify
    function renderV() {
        let l=document.getElementById('v-list'); l.innerHTML=db.wait.length?'':'<p style="text-align:center;opacity:0.5;">ไม่มีรายการรอตรวจสอบ</p>';
        db.wait.forEach(v => { l.innerHTML+=`<div class="list-item"><strong>฿${v.a} | ${v.n}</strong><button class="btn-gold" onclick="confirmV(${v.id})" style="margin-top:10px;">✅ ยืนยันเงินเข้าแล้ว</button></div>`; });
    }
    function confirmV(id) {
        let v=db.wait.find(x=>x.id===id); db.total+=v.a;
        db.history.push({...v, date: new Date().toLocaleDateString()});
        db.wait=db.wait.filter(x=>x.id!==id);
        save(); updateUI(); renderV();
    }

    // Logic: Member
    function searchMember() {
        let tel = document.getElementById('m-phone').value; if(!tel) return;
        if(!db.members[tel]) db.members[tel] = {p:0};
        let m = db.members[tel];
        document.getElementById('m-result').innerHTML = `<div class="list-item" style="text-align:center;">เบอร์: ${tel}<br><h2 style="color:var(--secondary);">${m.p} แต้ม</h2><button class="btn-gold" onclick="addPoint('${tel}')">+ เพิ่ม 1 แต้ม</button></div>`;
        save();
    }
    function addPoint(t) { db.members[t].p++; searchMember(); save(); }

    // Logic: Stock
    function renderStock() {
        let l=document.getElementById('stock-list'); l.innerHTML='';
        db.stock.forEach((s, i) => {
            l.innerHTML+=`<div class="list-item"><strong>${s.n}</strong>: ${s.q} ${s.u} <div style="float:right;"><button onclick="adjStock(${i},-1)">-</button><button onclick="adjStock(${i},1)">+</button></div></div>`;
        });
    }
    function adjStock(i, v) { db.stock[i].q += v; save(); renderStock(); }

    // Logic: Stat
    function renderStat() {
        let l=document.getElementById('stat-content');
        l.innerHTML = `<div class="summary-card"><small>จำนวนเคสวันนี้</small><h1>${db.history.length}</h1></div>`;
    }

    async function exportSheet() {
        try {
            await fetch('https://script.google.com/macros/s/AKfycby-BRWBtHvZTJL2rJlyKNJWGJujoXmubwlWPWwpiQ7Qi3jNtfICqgn_-jQriMoRrfuIKQ/exec', {
                method: 'POST', body: JSON.stringify(db.history)
            });
            alert('Export Success');
        } catch(e) { alert('Export Failed'); }
    }

    function save() { 
        localStorage.setItem('bpt_total', db.total); 
        localStorage.setItem('bpt_queues', JSON.stringify(db.queues)); 
        localStorage.setItem('bpt_wait', JSON.stringify(db.wait)); 
        localStorage.setItem('bpt_members', JSON.stringify(db.members)); 
        localStorage.setItem('bpt_history', JSON.stringify(db.history)); 
        localStorage.setItem('bpt_stock', JSON.stringify(db.stock)); 
    }
</script>
</body>
</html>
