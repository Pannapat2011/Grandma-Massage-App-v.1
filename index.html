<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประคบทอง ไทย/สปา</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Kanit:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --main-gold: #996515; --bg-cream: #F5EEDC; --card-white: #FFFBF2; --border-gold: #DED3BC; --danger: #D32F2F; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg-cream); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        
        /* 🏰 Header & Logo */
        .logo-main { width: 120px; margin-bottom: 20px; }
        
        /* 💳 Balance Card (UI เดิม) */
        .balance-box { background: #FFF; padding: 40px 20px; border-radius: 40px; border: 1px solid var(--border-gold); margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .balance-box h2 { font-family: 'Kanit'; font-size: 60px; margin: 10px 0; color: var(--main-gold); }
        
        /* 🔘 Buttons Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; }
        .menu-btn { background: #FFF; padding: 25px; border-radius: 40px; border: 1px solid var(--border-gold); cursor: pointer; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .menu-btn:active { transform: scale(0.98); background: #fdfdfd; }

        /* 📄 Pages UI */
        .page { display: none; background: var(--card-white); padding: 30px; border-radius: 40px; border: 1px solid var(--border-gold); animation: fadeIn 0.3s; }
        input, select, button.action-btn { width: 100%; padding: 18px; margin-top: 15px; border-radius: 15px; border: 1px solid var(--border-gold); font-size: 18px; box-sizing: border-box; }
        button.action-btn { background: var(--main-gold); color: white; border: none; font-weight: bold; cursor: pointer; }
        .danger-btn { background: var(--danger) !important; color: white !important; }

        /* 🚨 Modal ยืนยัน */
        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 3000; }
        .modal-box { background: white; width: 90%; max-width: 350px; padding: 40px 20px; border-radius: 40px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg-cream); display:flex; align-items:center; justify-content:center; z-index:2000;">
    <div style="width:85%; max-width:350px; text-align:center;">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-main">
        <input type="text" id="user-input" placeholder="User">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="action-btn" onclick="handleAuth()">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="confirm-modal">
    <div class="modal-box">
        <h3 style="color:var(--danger); font-family:'Kanit';">ยืนยันการล้างข้อมูล?</h3>
        <p>ยอดเงินและคิวทั้งหมดจะหายไป</p>
        <button class="action-btn danger-btn" onclick="resetEverything()">ยืนยัน</button>
        <button onclick="closeModal()" style="border:none; background:none; color:#888; margin-top:20px; width:100%; cursor:pointer;">ยกเลิก</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-main">
        <div class="balance-box">
            <small>ยอดรวมรายได้วันนี้ (<span id="user-label"></span>)</small>
            <h2 id="total-val">฿0</h2>
        </div>
        <div class="menu-grid">
            <div class="menu-btn" onclick="openPage('p-queue')">📅 ลงคิวจอง</div>
            <div class="menu-btn" onclick="openPage('p-pay')">💰 รับชำระเงิน</div>
            <div class="menu-btn" onclick="openPage('p-verify')">🔍 บันทึกลงชีท</div>
            <div class="menu-btn" onclick="openPage('p-settings')">⚙️ จัดการหมอ</div>
        </div>
        <p style="color:var(--danger); margin-top:30px; cursor:pointer; font-weight:bold;" onclick="openModal()">⚠️ ล้างข้อมูลทั้งหมดเป็น 0</p>
        <button onclick="location.reload()" style="background:none; border:none; color:#AAA; margin-top:20px;">ออกจากระบบ</button>
    </div>

    <div id="p-queue" class="page">
        <h3>ลงตารางจองคิว</h3>
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
        <select id="q-type">
            <option value="นวดไทย">นวดไทย</option>
            <option value="นวดไทยประคบ">นวดไทยประคบ</option>
            <option value="นวดสปา">นวดสปา</option>
            <option value="นวดแก้อาการ">นวดแก้อาการ</option>
        </select>
        <select id="q-dr-select"></select>
        <input type="number" id="q-price" placeholder="ราคา">
        <button class="action-btn" onclick="addQ()">บันทึกคิว</button>
        <button onclick="openPage('home')" class="action-btn" style="background:#888; margin-top:10px;">กลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3>รับเงิน</h3>
        <select id="pay-select" onchange="autoPay()"></select>
        <input type="number" id="pay-amt" placeholder="0" style="font-size:30px; text-align:center;">
        <button class="action-btn" onclick="submitPay()">แจ้งยอดรับเงิน</button>
        <button onclick="openPage('home')" class="action-btn" style="background:#888; margin-top:10px;">กลับ</button>
    </div>

    <div id="p-verify" class="page">
        <h3>ตรวจสอบยอดลงชีท</h3>
        <div id="v-list"></div>
        <button onclick="openPage('home')" class="action-btn" style="background:#888; margin-top:10px;">กลับ</button>
    </div>

    <div id="p-settings" class="page">
        <h3>รายชื่อหมอนวด</h3>
        <input type="text" id="new-dr-name" placeholder="ชื่อหมอคนใหม่">
        <button class="action-btn" onclick="addDr()">เพิ่มหมอ</button>
        <div id="manage-dr-list" style="margin-top:20px;"></div>
        <button onclick="openPage('home')" class="action-btn" style="background:#888; margin-top:10px;">กลับ</button>
    </div>
</div>

<script>
    // 🚩 URL ที่มึงก๊อปมาจาก Web App
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS3acLTKEmqAutw19YgnUfs3viIZwLNF0me2nfM9ck4KyJv-Ulk8DAb5m3G12FtVQeFA/exec";
    
    let currentUser = "", db = {};

    function handleAuth() {
        let u = document.getElementById('user-input').value.toLowerCase().trim(), p = document.getElementById('pass-input').value;
        if (p === '123456') {
            currentUser = (u === 'admin2') ? 'admin2' : 'admin';
            loadDB();
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-label').innerText = currentUser;
            updateUI();
        } else alert('รหัสผ่านไม่ถูกต้อง');
    }

    function loadDB() {
        let pf = currentUser + "_";
        db = {
            total: parseInt(localStorage.getItem(pf+'total')) || 0,
            queues: JSON.parse(localStorage.getItem(pf+'queues')) || [],
            wait: JSON.parse(localStorage.getItem(pf+'wait')) || [],
            doctors: JSON.parse(localStorage.getItem(pf+'doctors')) || [{n:"หมอนก", st:"free"}]
        };
    }

    function save() {
        let pf = currentUser + "_";
        localStorage.setItem(pf+'total', db.total);
        localStorage.setItem(pf+'queues', JSON.stringify(db.queues));
        localStorage.setItem(pf+'wait', JSON.stringify(db.wait));
        localStorage.setItem(pf+'doctors', JSON.stringify(db.doctors));
    }

    function updateUI() { document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`; save(); }

    function openPage(id) {
        document.getElementById('home').style.display='none';
        document.querySelectorAll('.page').forEach(p=>p.style.display='none');
        document.getElementById(id).style.display='block';
        if(id==='p-queue') { populateDrSelect(); }
        if(id==='p-pay') updateDrop();
        if(id==='p-verify') renderV();
        if(id==='p-settings') renderManageDr();
    }

    function populateDrSelect() {
        let s = document.getElementById('q-dr-select'); s.innerHTML = '<option value="">-- เลือกหมอ --</option>';
        db.doctors.forEach(d => { s.innerHTML += `<option value="${d.n}">${d.n}</option>`; });
    }

    function addQ() {
        let n=document.getElementById('q-name').value, p=parseInt(document.getElementById('q-price').value), t=document.getElementById('q-type').value, dr=document.getElementById('q-dr-select').value;
        if(!n||!p||!dr) return alert('กรอกครบป่าว');
        db.queues.push({id:Date.now(), n, p, type:t, dr});
        save(); openPage('home'); alert('บันทึกคิวแล้ว');
    }

    function updateDrop() {
        let s=document.getElementById('pay-select'); s.innerHTML='<option value="">-- เลือกคิวลูกค้า --</option>';
        db.queues.forEach(q=>s.innerHTML+=`<option value="${q.id}">${q.n}</option>`);
    }

    function autoPay() {
        let id=document.getElementById('pay-select').value; let q=db.queues.find(x=>x.id==id);
        if(q){document.getElementById('pay-amt').value=q.p;}
    }

    function submitPay() {
        let a=parseInt(document.getElementById('pay-amt').value), qId=document.getElementById('pay-select').value;
        if(!a||!qId) return;
        let q = db.queues.find(x => x.id == qId);
        db.wait.push({id:Date.now(), a, n:q.n, type: q.type, dr: q.dr});
        db.queues = db.queues.filter(x => x.id != qId);
        save(); openPage('home'); updateUI();
    }

    function renderV() {
        let l=document.getElementById('v-list'); l.innerHTML=db.wait.length?'':'<p>ไม่มีรายการ</p>';
        db.wait.forEach(v => l.innerHTML+=`<div style="padding:15px; border-bottom:1px solid #eee; text-align:left;">฿${v.a} | ${v.n} <button onclick="confirmV(${v.id})" style="float:right; background:var(--main-gold); color:white; border:none; border-radius:10px; padding:5px 10px;">บันทึก</button></div>`);
    }

    async function confirmV(id) {
        let v=db.wait.find(x=>x.id===id);
        let record={date:new Date().toLocaleDateString('th-TH'), time:new Date().toLocaleTimeString('th-TH'), n:v.n, type:v.type, dr:v.dr, a:v.a, user:currentUser};
        db.total+=v.a; db.wait=db.wait.filter(x=>x.id!==id);
        updateUI(); renderV();
        try { fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify([record])}); } catch(e){}
    }

    function openModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    function resetEverything() { db.total = 0; db.queues = []; db.wait = []; save(); closeModal(); updateUI(); }
    
    function addDr() { let n = document.getElementById('new-dr-name').value; if(n){ db.doctors.push({n, st:"free"}); save(); renderManageDr(); } }
    function renderManageDr() {
        let l = document.getElementById('manage-dr-list'); l.innerHTML = '';
        db.doctors.forEach((d, i) => l.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">${d.n} <button onclick="delDr(${i})" style="color:red; float:right;">ลบ</button></div>`);
    }
    function delDr(i) { db.doctors.splice(i, 1); save(); renderManageDr(); }
</script>
</body>
</html>
