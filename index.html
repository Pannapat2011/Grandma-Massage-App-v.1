<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประคบทองไทยสปา - Warm Cream POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* 🎨 Theme สีครีมเน้นๆ */
        :root {
            --cream: #F5EEDC; /* สีครีมชัดเจน */
            --primary: #996515;
            --bg: #EFE6D5;
            --card: #FFFBF2;
            --text: #433D35;
            --border: #DED3BC;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 🔒 Login Screen */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            width: 85%;
            text-align: center;
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* 🏠 Dashboard UI */
        .brand-section { text-align: center; margin-bottom: 25px; }
        .brand-section img { width: 100px; margin-bottom: 10px; }
        .brand-section h1 { font-size: 24px; margin: 0; color: var(--primary); font-weight: 600; }

        .balance-card {
            background: var(--card);
            padding: 35px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .balance-card h2 { font-size: 45px; margin: 10px 0; color: var(--primary); font-weight: 600; }

        /* 🔘 Menu Buttons */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item {
            background: var(--card);
            padding: 25px 15px;
            border-radius: 25px;
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .menu-item:active { background: var(--cream); transform: scale(0.95); }
        .menu-item span { font-size: 32px; display: block; margin-bottom: 8px; }

        /* 📄 Sub-Page UI */
        .page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h3 { color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        input, select, button.btn-primary {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 15px;
            border: 1px solid var(--border); background: var(--card); font-size: 16px; 
            font-family: 'Sarabun'; box-sizing: border-box; outline: none;
        }

        button.btn-primary { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            font-weight: 600; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(153, 101, 21, 0.2);
        }

        .list-item {
            padding: 18px; 
            background: var(--card);
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #qr-box { 
            display: none; 
            text-align: center; 
            margin-top: 25px; 
            background: #FFF; 
            padding: 20px; 
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        #qr-img { width: 220px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" width="110">
        <h2 style="color:var(--primary);">ประคบทองไทยสปา</h2>
        <input type="text" id="user-input" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="pass-input" placeholder="รหัสผ่าน">
        <button class="btn-primary" onclick="handleAuth()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="brand-section">
            <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png">
            <h1>ประคบทองไทยสปา</h1>
        </div>

        <div class="balance-card">
            <small style="color:#8E8474; letter-spacing: 1px;">ยอดเงินรวมวันนี้</small>
            <h2 id="total-val">฿0</h2>
            <div style="font-size:12px; margin-top:12px; color: #8E8474;">
                ผู้ใช้: <b id="current-user"></b> | รอยืนยัน: <b id="wait-count" style="color:#D32F2F;">0</b>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('p-queue')"><span>📅</span><strong>ลงคิว</strong></div>
            <div class="menu-item" onclick="openPage('p-pay')"><span>💰</span><strong>รับเงิน</strong></div>
            <div class="menu-item" onclick="openPage('p-verify')"><span>🔍</span><strong>เช็คยอด</strong></div>
            <div class="menu-item" onclick="openPage('p-hist')"><span>📋</span><strong>ประวัติ</strong></div>
        </div>
        
        <button onclick="if(confirm('Logout?')) location.reload();" style="background:none; border:none; color:#B4A894; width:100%; margin-top:60px; font-size:11px; cursor:pointer;">ออกจากระบบ</button>
    </div>

    <div id="p-queue" class="page">
        <h3>บันทึกคิวจอง</h3>
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="q-price" placeholder="ราคาบริการ">
        <div style="display:flex; gap:10px;"><input type="time" id="q-s"><input type="time" id="q-e"></div>
        <button class="btn-primary" onclick="addQ()">บันทึกคิว</button>
        <div id="q-list" style="margin-top:20px;"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:#999; width:100%; margin-top:20px;">กลับหน้าหลัก</button>
    </div>

    <div id="p-pay" class="page">
        <h3>รับชำระเงิน</h3>
        <select id="pay-select" onchange="autoPay()"></select>
        <input type="text" id="pay-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="pay-amt" placeholder="0" oninput="genQR()" style="font-size:36px; text-align:center; border:none; border-bottom:2px solid var(--primary); background:none; color:var(--primary); font-weight:bold;">
        <div id="qr-box">
            <img id="qr-img" src="">
            <p style="font-size:13px; color:#666; margin-top:10px;">พร้อมเพย์: <span id="display-pp" style="font-weight:bold; color:var(--primary);"></span></p>
        </div>
        <button class="btn-primary" onclick="submitPay()" style="margin-top:20px;">ยืนยันแจ้งโอน</button>
        <button onclick="openPage('home')" style="background:none; border:none; color:#999; width:100%; margin-top:20px;">ยกเลิก</button>
    </div>

    <div id="p-verify" class="page">
        <h3>รายการรอตรวจสอบ</h3>
        <div id="v-list"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:#999; width:100%; margin-top:20px;">กลับหน้าหลัก</button>
    </div>

    <div id="p-hist" class="page">
        <h3>ประวัติการรับเงิน</h3>
        <div id="hist-list"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:#999; width:100%; margin-top:20px;">กลับหน้าหลัก</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-BRWBtHvZTJL2rJlyKNJWGJujoXmubwlWPWwpiQ7Qi3jNtfICqgn_-jQriMoRrfuIKQ/exec";
    
    let activePP = "0863526387";
    let db = {
        total: parseInt(localStorage.getItem('bpt_total')) || 0,
        queues: JSON.parse(localStorage.getItem('bpt_queues')) || [],
        wait: JSON.parse(localStorage.getItem('bpt_wait')) || [],
        history: JSON.parse(localStorage.getItem('bpt_history')) || []
    };

    function handleAuth() {
        let user = document.getElementById('user-input').value;
        let pass = document.getElementById('pass-input').value;

        if (user === 'admin2' && pass === '123456') {
            activePP = "0812799119";
            document.getElementById('current-user').innerText = "admin2";
            loginDone();
        } else if (pass === '123456') {
            activePP = "0863526387";
            document.getElementById('current-user').innerText = user || "admin";
            loginDone();
        } else {
            alert('รหัสผ่านไม่ถูกต้อง');
        }
    }

    function loginDone() {
        document.getElementById('login-overlay').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('display-pp').innerText = activePP;
        updateUI();
    }

    function openPage(id) { 
        document.getElementById('home').style.display='none'; 
        document.querySelectorAll('.page').forEach(p=>p.style.display='none'); 
        document.getElementById(id).style.display='block'; 
        if(id==='p-queue')renderQ(); 
        if(id==='p-pay')updateDrop(); 
        if(id==='p-verify')renderV(); 
        if(id==='p-hist')renderH(); 
    }

    function updateUI() { 
        document.getElementById('total-val').innerText=`฿${db.total.toLocaleString()}`; 
        document.getElementById('wait-count').innerText=db.wait.length; 
    }

    function genQR() {
        let a = document.getElementById('pay-amt').value;
        if(a > 0) {
            document.getElementById('qr-img').src = `https://promptpay.io/${activePP}/${a}.png?t=${Date.now()}`;
            document.getElementById('qr-box').style.display='block';
        } else document.getElementById('qr-box').style.display='none';
    }

    function addQ() {
        let n=document.getElementById('q-name').value, p=document.getElementById('q-price').value, s=document.getElementById('q-s').value, e=document.getElementById('q-e').value;
        if(!n||!p) return;
        db.queues.push({id:Date.now(), n, p, s, e}); save(); renderQ();
        document.getElementById('q-name').value = ''; document.getElementById('q-price').value = '';
    }

    function renderQ() {
        let l=document.getElementById('q-list'); l.innerHTML='';
        db.queues.forEach(q => { l.innerHTML+=`<div class="list-item"><div><strong>${q.n}</strong><br><small style="color:#999;">${q.s}-${q.e}</small></div><div style="color:var(--primary); font-weight:bold;">฿${q.p} <span onclick="delQ(${q.id})" style="color:red; margin-left:12px; cursor:pointer; font-size:18px;">×</span></div></div>`; });
    }
    function delQ(id) { if(confirm('ลบคิวนี้?')){ db.queues=db.queues.filter(x=>x.id!==id); save(); renderQ(); } }

    function updateDrop() {
        let s = document.getElementById('pay-select'); s.innerHTML='<option value="">-- เลือกจากคิวจอง --</option>';
        db.queues.forEach(q => s.innerHTML+=`<option value="${q.id}">${q.n}</option>`);
    }

    function autoPay() { 
        let id=document.getElementById('pay-select').value; if(!id)return; 
        let q=db.queues.find(x=>x.id==id); 
        document.getElementById('pay-name').value=q.n; 
        document.getElementById('pay-amt').value=q.p; 
        genQR(); 
    }

    function submitPay() {
        let a=parseInt(document.getElementById('pay-amt').value), n=document.getElementById('pay-name').value, qId=document.getElementById('pay-select').value;
        if(!a||!n) return alert('กรอกชื่อและยอดเงิน');
        db.wait.push({id:Date.now(), n, a, qId});
        if(qId) db.queues=db.queues.filter(x=>x.id!=qId);
        save(); alert('บันทึกรายการแล้ว รอย่ายืนยันเงินเข้า'); openPage('home'); updateUI();
    }

    function renderV() {
        let l=document.getElementById('v-list'); l.innerHTML=db.wait.length?'':'<p style="text-align:center; opacity:0.5; margin-top:40px;">ไม่มีรายการรอตรวจสอบ</p>';
        db.wait.forEach(v => { l.innerHTML+=`<div class="list-item"><div><strong>${v.n}</strong><br><b style="color:var(--primary)">฿${v.a}</b></div><button onclick="confirmV(${v.id})" style="background:var(--primary); color:#fff; border:none; padding:10px 20px; border-radius:12px; font-size:12px; cursor:pointer;">ยืนยันเงินเข้า</button></div>`; });
    }

    async function confirmV(id) {
        let v = db.wait.find(x => x.id === id);
        let record = { 
            date: new Date().toLocaleDateString('th-TH'), 
            time: new Date().toLocaleTimeString('th-TH'), 
            n: v.n, a: v.a, 
            user: document.getElementById('current-user').innerText 
        };
        db.total += v.a; db.history.push(record); db.wait = db.wait.filter(x => x.id !== id);
        save(); updateUI(); renderV();
        try { fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify([record]) }); } catch (e) {}
    }

    function renderH() {
        let l=document.getElementById('hist-list'); l.innerHTML='';
        db.history.slice().reverse().forEach(h => { l.innerHTML+=`<div class="list-item"><div><strong>${h.n}</strong><br><small style="color:#999;">${h.time}</small></div><div style="font-weight:bold;">฿${h.a}</div></div>`; });
    }

    function save() { 
        localStorage.setItem('bpt_total', db.total); 
        localStorage.setItem('bpt_queues', JSON.stringify(db.queues)); 
        localStorage.setItem('bpt_wait', JSON.stringify(db.wait)); 
        localStorage.setItem('bpt_history', JSON.stringify(db.history)); 
    }
</script>
</body>
</html>
