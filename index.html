<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประคบทอง - Queue & Dur Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F0F2F5; --gold: #B8860B; --shd: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; --in: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; color: #1D1D1F; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; margin: auto; }
        .btn-neu { background: var(--bg); border: none; padding: 15px; border-radius: 20px; box-shadow: var(--shd); cursor: pointer; font-family: 'Kanit'; font-weight: 600; width: 100%; margin-top: 12px; }
        .btn-neu:active { box-shadow: var(--in); transform: scale(0.98); }
        .btn-gold { background: var(--gold) !important; color: white !important; }
        .card { background: var(--bg); padding: 25px; border-radius: 35px; box-shadow: var(--in); text-align: center; margin-bottom: 25px; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; justify-content: center; }
        .chip { padding: 8px 12px; border-radius: 15px; background: var(--bg); box-shadow: var(--shd); font-size: 12px; cursor: pointer; }
        .chip.active { box-shadow: var(--in); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .list-item { padding: 15px; background: white; border-radius: 20px; margin-bottom: 10px; box-shadow: var(--shd); font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 12px; margin-top: 10px; }
        th { background: var(--gold); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-txt { font-size: 14px; font-weight: bold; }
        .free-txt { color: #28a745 !important; }
        .busy-txt { color: #dc3545 !important; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--bg); border-radius: 25px; margin-bottom: 12px; box-shadow: var(--shd); }
        .switch { position: relative; width: 55px; height: 30px; appearance: none; background: #d1d1d1; border-radius: 20px; outline: none; transition: 0.3s; cursor: pointer; }
        .switch:checked { background: var(--gold); }
        .switch::before { content: ''; position: absolute; width: 24px; height: 24px; border-radius: 50%; top: 3px; left: 3px; background: white; transition: 0.3s; }
        .switch:checked::before { left: 28px; }
    </style>
</head>
<body onload="checkLogin()">

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div class="card" style="width:80%;">
        <h2 style="color:var(--gold);">ประคบทอง</h2>
        <input type="password" id="pass" placeholder="รหัสผ่าน 123456" style="width:100%; padding:15px; border-radius:15px; border:none; box-shadow: var(--in); outline:none; text-align:center; background:var(--bg);">
        <button class="btn-neu btn-gold" onclick="auth()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="card"><small>รายได้วันนี้ (Auto-Sync)</small><h2 id="total-val" style="font-size:38px; color:var(--gold);">฿0</h2></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn-neu" onclick="openP('p-q')">📅 ลงคิวจอง</button>
            <button class="btn-neu" onclick="openP('p-pay')">💰 รับเงิน/QR</button>
            <button class="btn-neu" onclick="openP('p-st')">🧘‍♂️ สถานะหมอ</button>
            <button class="btn-neu btn-gold" onclick="openP('p-list')">📜 รายการคิว</button>
            <button class="btn-neu" onclick="openP('p-hist')">📜 ประวัติงาน</button>
            <button class="btn-neu" onclick="openP('p-set')">⚙️ ตั้งค่า</button>
        </div>
    </div>

    <div id="p-q" class="page">
        <h3>ลงคิวจอง</h3>
        <input type="text" id="qn" placeholder="ชื่อลูกค้า" class="btn-neu" style="background:white;">
        <div class="chip-group" id="prog-chips">
            <div class="chip active" onclick="selectType(this, 'thai')">นวดไทย</div>
            <div class="chip" onclick="selectType(this, 'foot')">นวดเท้า</div>
            <div class="chip" onclick="selectType(this, 'back')">นวดไทยรีดเส้น</div>
            <div class="chip" onclick="selectType(this, 'oil')">นวดน้ำมัน</div>
            <div class="chip" onclick="selectType(this, 'spa')">ขัดผิวกาย</div>
            <div class="chip" onclick="selectType(this, 'face')">นวดหน้า</div>
            <div class="chip" onclick="selectType(this, 'herb')">อบสมุนไพร</div>
        </div>
        <small>ระยะเวลา:</small>
        <div class="chip-group" id="dur-chips">
            <div class="chip dur-btn" id="dur-30" onclick="selectDur(this, 30)" style="display:none;">30น.</div>
            <div class="chip active dur-btn" id="dur-60" onclick="selectDur(this, 60)">1ชม.</div>
            <div class="chip dur-btn" id="dur-120" onclick="selectDur(this, 120)">2ชม.</div>
        </div>
        <select id="qdr" class="btn-neu" style="background:white;"></select>
        <input type="number" id="qp" class="btn-neu" style="background:white; color:var(--gold); font-size:24px; text-align:center;">
        <button class="btn-neu btn-gold" onclick="saveQ()">บันทึกคิว</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3>💰 ชำระเงิน</h3>
        <select id="psel" class="btn-neu" onchange="autoP()" style="background:white;"></select>
        <div class="chip-group"><div class="chip active" id="mqr" onclick="setM('qr')">โอน (QR)</div><div class="chip" id="mcash" onclick="setM('cash')">เงินสด</div></div>
        <input type="number" id="pa" placeholder="ยอดเงิน" class="btn-neu" style="text-align:center; font-size:30px; background:white;" oninput="genQR()">
        <div id="qr-area" style="display:none; text-align:center; margin:15px 0;"><img id="qr-img" src="" style="width:200px; border:10px solid white; border-radius:20px;"><p id="pp-txt" style="font-weight:bold;"></p></div>
        <button class="btn-neu btn-gold" onclick="pay()">ยืนยันรับเงิน</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>

    <div id="p-st" class="page"><h3>สถานะหมอนวด</h3><div id="st-list"></div><button class="btn-neu btn-gold" onclick="openP('home')">กลับ</button></div>
    <div id="p-list" class="page"><h3>รายการคิวทั้งหมด</h3><div style="overflow-x:auto;"><table><thead><tr><th>ลูกค้า</th><th>หมอ</th><th>เริ่ม</th><th>เสร็จ</th><th>สถานะ</th></tr></thead><tbody id="tb-list"></tbody></table></div><button class="btn-neu btn-gold" onclick="openP('home')" style="margin-top:15px;">กลับ</button></div>
    <div id="p-hist" class="page"><h3>ประวัติวันนี้</h3><div id="hist-list"></div><button class="btn-neu btn-gold" onclick="openP('home')">กลับ</button></div>
    <div id="p-set" class="page"><h3>ตั้งค่า</h3><input type="text" id="ppp" class="btn-neu" placeholder="พร้อมเพย์"><button class="btn-neu btn-gold" onclick="setPP()">บันทึกเบอร์</button><hr><input type="text" id="ndr" class="btn-neu" placeholder="ชื่อหมอ"><button class="btn-neu" onclick="addDr()">+ เพิ่มหมอ</button><div id="mdr" style="margin-top:10px;"></div><hr><button class="btn-neu" style="color:red;" onclick="reset()">⚠️ ล้างข้อมูลวันใหม่</button><button class="btn-neu" onclick="openP('home')">กลับ</button></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS3acLTKEmqAutw19YgnUfs3viIZwLNF0me2nfM9ck4KyJv-Ulk8DAb5m3G12FtVQeFA/exec";
    const DEFAULT_DRS = [{n:"บุฟผา", st:"free"},{n:"แก้ว", st:"free"},{n:"อุไร", st:"free"},{n:"อารี", st:"free"},{n:"ป้าเปลี่ยม", st:"free"},{n:"เหมียว", st:"free"},{n:"ดา", st:"free"}];
    let db = { total:0, qs:[], drs: DEFAULT_DRS.map(d=>({...d, end:"", started:false, dur:60})), hist:[], pp:'0863526387' };
    const basePrices = { 'thai': 250, 'foot': 300, 'back': 300, 'oil': 400, 'spa': 700, 'face': 400, 'herb': 200 };
    let curType = 'thai', curDur = 60, mode = 'qr';

    function auth() { if(document.getElementById('pass').value==='123456'){ localStorage.setItem('isL','t'); location.reload(); } }
    function checkLogin() { if(localStorage.getItem('isL')==='t'){ document.getElementById('login-overlay').style.display='none'; document.getElementById('app').style.display='block'; init(); } }
    function init() { let s = localStorage.getItem('prakob_fix_final_v1'); if(s) db = JSON.parse(s); update(); setInterval(tick, 1000); updatePrice(); }
    function save() { localStorage.setItem('prakob_fix_final_v1', JSON.stringify(db)); update(); }
    function openP(id) { document.querySelectorAll('.page, #home').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; if(id==='p-q') { rdrD(); updatePrice(); } if(id==='p-st') rst(); if(id==='p-list') rt(); if(id==='p-pay') { rps(); genQR(); } if(id==='p-hist') rh(); if(id==='p-set') rm(); }

    function selectType(el, type) {
        document.querySelectorAll('#prog-chips .chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); curType = type;
        if(type === 'herb') { document.getElementById('dur-30').style.display = 'inline-block'; selectDur(document.getElementById('dur-30'), 30); } 
        else { document.getElementById('dur-30').style.display = 'none'; if(curDur === 30) selectDur(document.getElementById('dur-60'), 60); }
        updatePrice();
    }
    function selectDur(el, dur) { document.querySelectorAll('#dur-chips .chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); curDur = dur; updatePrice(); }
    function updatePrice() { let base = basePrices[curType]; let final = curType === 'herb' ? base : (curDur === 60 ? base : base*2); document.getElementById('qp').value = final; }

    function saveQ() {
        let n = document.getElementById('qn').value, dr = document.getElementById('qdr').value, p = document.getElementById('qp').value;
        if(!n || !dr) return alert('ใส่ชื่อลูกค้าและเลือกหมอ!');
        db.qs.push({id:Date.now(), n, dr, p, type:document.querySelector('#prog-chips .chip.active').innerText, s:false, t:'รอเริ่ม', e:'รอเริ่ม', dur:curDur, paid:false});
        let i = db.drs.findIndex(x=>x.n===dr); if(i!==-1){ db.drs[i].st='busy'; db.drs[i].dur=curDur; db.drs[i].started=false; }
        save(); openP('home');
    }

    function startM(i) {
        let now = new Date(), sStr = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
        let end = new Date(now.getTime() + db.drs[i].dur*60000), eStr = end.getHours().toString().padStart(2,'0')+":"+end.getMinutes().toString().padStart(2,'0');
        db.drs[i].started=true; db.drs[i].end=eStr;
        let qi = db.qs.findIndex(x=>x.dr===db.drs[i].n && !x.s); if(qi!==-1){ db.qs[qi].s=true; db.qs[qi].t=sStr; db.qs[qi].e=eStr; } save(); rst();
    }

    async function pay() {
        let id = document.getElementById('psel').value, a = document.getElementById('pa').value;
        let qIdx = db.qs.findIndex(x=>x.id==id); if(qIdx===-1) return alert('เลือกคิวลูกค้า!');
        let q = db.qs[qIdx];
        let rec = { date: new Date().toLocaleDateString('th-TH'), time: new Date().toLocaleTimeString('th-TH'), n: q.n, type: q.type, dr: q.dr, a: a, mode: mode };
        db.total += parseInt(a); db.hist.push(rec); 
        // 🚩 แก้ไข: มาร์คว่าจ่ายเงินแล้ว แทนการลบทิ้งทันที
        db.qs[qIdx].paid = true;
        let di = db.drs.findIndex(x=>x.n===q.dr); if(di!==-1){ db.drs[di].st='free'; db.drs[di].end=""; db.drs[di].started=false; }
        save(); fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify([rec]) });
        alert('รับเงินเรียบร้อย!'); openP('home');
    }

    function genQR() { 
        let a = document.getElementById('pa').value; let d = document.getElementById('qr-area');
        if(mode==='qr' && a > 0) { document.getElementById('qr-img').src = `https://promptpay.io/${db.pp}/${a}.png?t=${Date.now()}`; document.getElementById('pp-txt').innerText = "พร้อมเพย์: "+db.pp; d.style.display = 'block'; } 
        else { d.style.display = 'none'; }
    }
    function setM(m) { mode=m; document.getElementById('mqr').classList.toggle('active', m==='qr'); document.getElementById('mcash').classList.toggle('active', m==='cash'); if(m==='cash') document.getElementById('qr-area').style.display='none'; else genQR(); }
    function rst() { document.getElementById('st-list').innerHTML = db.drs.map((d,i)=>`<div class="switch-container list-item"><div><strong>${d.n}</strong><br><span class="status-txt ${d.st==='free'?'free-txt':'busy-txt'}">(${d.st==='free'?'ว่าง':'ไม่ว่าง'})</span></div><div style="display:flex; align-items:center; gap:10px;">${d.st==='busy' && !d.started ? `<button class="btn-neu btn-gold" onclick="startM(${i})">เริ่มนวด</button>` : (d.end?`⏰ ${d.end}`:'')}<input type="checkbox" class="switch" ${d.st==='busy'?'checked':''} onchange="db.drs[${i}].st=db.drs[${i}].st==='free'?'busy':'free';save();rst()"></div></div>`).join(''); }
    function rt() { document.getElementById('tb-list').innerHTML = db.qs.map(q=>`<tr><td>${q.n}</td><td>${q.dr}</td><td>${q.t}</td><td>${q.e}</td><td>${q.paid?'✅ จ่ายแล้ว':'⏳ รอดำเนินการ'}</td></tr>`).join(''); }
    function rh() { document.getElementById('hist-list').innerHTML = db.hist.map(h=>`<div class="list-item"><b>${h.n}</b> - ฿${h.a}<br><small>${h.time} | หมอ${h.dr} [${h.mode}]</small></div>`).reverse().join(''); }
    function rdrD() { document.getElementById('qdr').innerHTML = db.drs.filter(d=>d.st==='free').map(d=>`<option value="${d.n}">${d.n}</option>`).join(''); }
    function rps() { document.getElementById('psel').innerHTML = '<option value="">-- เลือกคิว --</option>'+db.qs.filter(x=>!x.paid).map(q=>`<option value="${q.id}">${q.n}</option>`).join(''); }
    function autoP() { let q = db.qs.find(x=>x.id==document.getElementById('psel').value); if(q) { document.getElementById('pa').value=q.p; genQR(); } }
    function setPP() { db.pp = document.getElementById('ppp').value; save(); alert('Saved!'); }
    function addDr() { let n = document.getElementById('ndr').value; if(n){ db.drs.push({n, st:'free', end:"", started:false}); save(); rm(); } }
    function rm() { document.getElementById('mdr').innerHTML = db.drs.map((d,i)=>`<div class="list-item">${d.n} <button onclick="db.drs.splice(${i},1);save();rm()">ลบ</button></div>`).join(''); }
    function update() { document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`; }
    function tick() { let now = new Date().getHours().toString().padStart(2,'0')+":"+new Date().getMinutes().toString().padStart(2,'0'); db.drs.forEach(d => { if(d.st==='busy' && d.started && d.end===now && !d.alt){ alert('จบงาน: '+d.n); d.alt=true; save(); } }); }
    function reset() { if(confirm('เริ่มวันใหม่?')){ db.total=0; db.qs=[]; db.hist=[]; save(); location.reload(); } }
</script>
</body>
</html>
