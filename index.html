<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บ้านประคบทอง ไทย/สปา - POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37; /* สีทองหลัก */
            --dark-gold: #996515; /* สีทองเข้ม */
            --light-bg: #F9F5F0; /* สีพื้นหลังครีมอ่อน */
            --white: #ffffff;
            --text: #333;
            --shadow: 0 10px 30px rgba(153,101,21,0.1);
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--light-bg); margin: 0; color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        
        /* สไตล์หน้า Login */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a, #333); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--white); padding: 40px; border-radius: 30px; width: 85%; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,0.5); border: 2px solid var(--primary-gold); }
        .login-box img.logo { width: 150px; margin-bottom: 20px; }
        .login-box h2 { color: var(--dark-gold); margin: 0 0 20px 0; font-size: 20px; }
        
        /* สไตล์หน้า Dashboard */
        #dashboard { display: none; text-align: center; }
        .header-logo { width: 120px; margin-bottom: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .total-card { background: var(--white); padding: 20px; border-radius: 25px; box-shadow: var(--shadow); border: 1px solid #eee; }
        .total-card h2 { margin: 5px 0; color: var(--dark-gold); font-size: 26px; }
        .total-card small { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-card { background: var(--white); padding: 25px; border-radius: 25px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .menu-card:active { transform: scale(0.95); }
        .menu-card:hover { border-color: var(--primary-gold); }
        .menu-card span { font-size: 40px; display: block; margin-bottom: 8px; color: var(--primary-gold); }
        .menu-card strong { color: var(--dark-gold); }

        /* UI Elements ทั่วไป */
        .sub-app { display: none; background: var(--white); padding: 25px; border-radius: 30px; box-shadow: var(--shadow); border: 1px solid #eee; }
        h3 { color: var(--dark-gold); border-bottom: 2px solid var(--light-bg); padding-bottom: 10px; margin-top: 0; }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 15px; border: 1px solid #eee; box-sizing: border-box; font-size: 16px; font-family: 'Sarabun', sans-serif; }
        input:focus, select:focus { border-color: var(--primary-gold); outline: none; }
        
        /* สไตล์ปุ่ม */
        button { background: linear-gradient(135deg, var(--dark-gold), var(--primary-gold)); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-back { background: #f5f5f5; color: #999; margin-top: 15px; border: 1px solid #eee; }
        
        /* สไตล์การ์ดรายการ */
        .item-card { background: #fcfcfc; padding: 15px; border-radius: 18px; border-left: 5px solid var(--primary-gold); margin-bottom: 12px; text-align: left; border-right: 1px solid #eee; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .item-card strong { color: var(--dark-gold); }
        
        /* สไตล์ปุ่มเลือกวิธีจ่าย */
        .pay-methods { display: flex; gap: 10px; margin-top: 15px; }
        .method-btn { padding: 12px; border: 2px solid #f0f0f0; border-radius: 15px; flex: 1; cursor: pointer; text-align: center; font-size: 14px; color: #999; transition: 0.3s; }
        .method-btn.active { border-color: var(--primary-gold); background: #FFFDF5; color: var(--dark-gold); font-weight: bold; }

        /* สไตล์ Smart QR */
        #qrZone { margin-top: 20px; text-align: center; min-height: 200px; }
        #qrPlaceholder { color: #ccc; padding-top: 80px; font-size: 14px; }
        #qrImageArea { display: none; }
        .qr-border { background: white; padding: 12px; border: 2px solid var(--primary-gold); border-radius: 20px; display: inline-block; box-shadow: var(--shadow); }
        #qrcode { width: 180px; height: 180px; display: block; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <img src="data:image/png;base64,กูขอข้ามโค้ดBase64ของโลโก้ไปนะมึงมันยาวมากมึงก๊อปเอาอันเดิมมาใส่ได้เลย" alt="โลโก้บ้านประคบทอง" class="logo">
        <h2>บ้านประคบทอง ไทย/สปา</h2>
        <input type="text" id="userInput" placeholder="ชื่อผู้ใช้">
        <input type="password" id="passInput" placeholder="รหัสผ่าน">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="app-container">
    <div id="dashboard">
        <img src="data:image/png;base64,กูขอข้ามโค้ดBase64ของโลโก้ไปนะมึงมันยาวมากมึงก๊อปเอาอันเดิมมาใส่ได้เลย" alt="โลโก้บ้านประคบทอง" class="header-logo">
        
        <div class="summary-grid">
            <div class="total-card" style="grid-column: span 2; background: linear-gradient(135deg, #1a1a1a, #333); color: white; border: 1px solid var(--primary-gold);">
                <small style="color: #ccc;">รายได้รวมทั้งหมดวันนี้</small>
                <h2 id="grandTotal" style="color: var(--primary-gold); font-size: 38px;">฿0</h2>
            </div>
            <div class="total-card"><small>💰 เงินสด</small><h2 id="cashTotal">฿0</h2></div>
            <div class="total-card"><small>📱 เงินโอน</small><h2 id="qrTotal">฿0</h2></div>
        </div>
        
        <div class="menu-grid">
            <div class="menu-card" onclick="showApp('queueApp')"><span>💆‍♂️</span><strong>จองคิว</strong></div>
            <div class="menu-card" onclick="showApp('paymentApp')"><span>💰</span><strong>จ่ายเงิน</strong></div>
            <div class="menu-card" onclick="showApp('staffApp')"><span>👤</span><strong>สถานะหมอ</strong></div>
            <div class="menu-card" onclick="loadHistory()"><span>📋</span><strong>ประวัติ</strong></div>
        </div>
        <button onclick="location.reload()" class="btn-back">ออกจากระบบ</button>
    </div>

    <div id="queueApp" class="sub-app">
        <h3>💆‍♂️ ลงทะเบียนจองคิว</h3>
        <select id="staffSelect"></select>
        <select id="serviceType">
            <option>นวดไทย</option><option>นวดไทยประคบ</option><option>นวดไทยออย</option>
            <option>นวดสปา+ขัดผิว</option><option>นวดฝ่าเท้า</option><option>นวดแก้อาการ</option>
        </select>
        <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
        <input type="number" id="servicePrice" placeholder="ราคาที่ตกลง (บาท)">
        <div style="display: flex; gap: 8px;"><input type="date" id="bookingDate"><input type="time" id="bookingTime"></div>
        <button onclick="addQueue()">✅ บันทึกคิว</button>
        <hr style="margin:20px 0; border:none; border-top:1px dashed #eee;">
        <div id="queueList"></div>
        <button onclick="showDashboard()" class="btn-back">⬅️ กลับหน้าหลัก</button>
    </div>

    <div id="paymentApp" class="sub-app">
        <h3>💰 ชำระเงิน</h3>
        <label>ระบุจำนวนเงินที่รับ:</label>
        <input type="number" id="payAmount" placeholder="ใส่ราคาตรงนี้" oninput="updateQR()" style="font-size: 28px; font-weight: bold; text-align: center; color: var(--dark-gold); border: 2px solid var(--primary-gold);">
        
        <div class="pay-methods">
            <div id="m_qr" class="method-btn active" onclick="setMethod('qr')">📱 โอน QR</div>
            <div id="m_cash" class="method-btn" onclick="setMethod('cash')">💵 เงินสด</div>
        </div>

        <div id="qrZone">
            <div id="qrPlaceholder">กรุณาใส่ราคาเพื่อสร้าง QR</div>
            <div id="qrImageArea">
                <div class="qr-border">
                    <img id="qrcode" src="" alt="QR Code">
                </div>
                <p style="font-size: 11px; color: #666; margin-top: 8px;">สแกนโอนเข้าเบอร์: 086-352-6387</p>
            </div>
        </div>

        <div id="cashZone" style="display: none; margin-top: 20px;">
            <input type="number" id="cashReceived" placeholder="รับเงินมา..." oninput="calcChange()">
            <h4 id="changeText" style="color: #D32F2F; margin-top: 12px; text-align: center;">เงินทอน: ฿0</h4>
        </div>

        <button onclick="confirmPayment()" style="background: linear-gradient(135deg, #1B5E20, #2E7D32); font-size: 18px; margin-top: 25px;">✔️ ได้รับเงินแล้ว</button>
        <button onclick="showDashboard()" class="btn-back">ยกเลิก</button>
    </div>

    <div id="staffApp" class="sub-app">
        <h3>👤 สถานะหมอนวด</h3>
        <div id="staffStatusList"></div>
        <button onclick="showDashboard()" class="btn-back">กลับหน้าหลัก</button>
    </div>

    <div id="historyApp" class="sub-app">
        <h3>📋 ประวัติวันนี้</h3>
        <div id="historyList"></div>
        <button onclick="showDashboard()" class="btn-back">กลับหน้าหลัก</button>
    </div>
</div>

<script>
    // --- ส่วน Logic (กูขอข้ามไปนะมึงมันเหมือนเดิมเป๊ะ) ---
    // ... โค้ด JavaScript ทั้งหมดเหมือนอันก่อนหน้า ...
</script>
</body>
</html>
