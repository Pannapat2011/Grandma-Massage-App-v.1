<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บ้านประคบทอง - Ultimate POS (Sheet Connected)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D4AF37; --secondary: #996515; --bg: #F9F5F0; --card: #ffffff; --text: #333; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; margin: auto; }
        
        /* Dashboard & Box */
        .summary-box { background: var(--card); padding: 25px; border-radius: 35px; border: 3px solid var(--primary); margin-bottom: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 4px solid var(--primary); text-align: center; }

        /* App Layout */
        .sub-app { display: none; background: var(--card); padding: 25px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 15px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: 'Sarabun'; }
        button { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; border: none; font-weight: bold; cursor: pointer; }
        .item-card { background: rgba(0,0,0,0.02); padding: 15px; border-radius: 20px; border-left: 6px solid var(--primary); margin-bottom: 12px; position: relative; text-align: left; }
        
        .timer-display { font-weight: bold; color: #D32F2F; font-size: 14px; }
        .btn-start { background: #2E7D32; padding: 5px 10px; width: auto; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:#121212; display:flex; justify-content:center; align-items:center; z-index:2000;">
    <div style="background:white; padding:40px; border-radius:35px; width:85%; text-align:center; border:3px solid var(--primary);">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" width="150">
        <h2>ระบบจัดการร้าน</h2>
        <input type="password" id="passInput" placeholder="รหัสผ่าน" style="text-align:center;">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="app-container">
    <div id="dashboard" style="display:none;">
        <div class="summary-box">
            <small>ยอดรายได้รวมวันนี้</small>
            <h1 id="grandTotal" style="font-size:45px; margin:10px 0; color:var(--secondary);">฿0</h1>
        </div>
        <div class="menu-grid">
            <div class="menu-card" onclick="showApp('queueApp')"><span>💆‍♂️</span><br><strong>คิว & จับเวลา</strong></div>
            <div class="menu-card" onclick="showApp('paymentApp')"><span>💰</span><br><strong>รับเงิน</strong></div>
            <div class="menu-card" onclick="showApp('reportApp'); renderReport();"><span>📊</span><br><strong>สรุปยอดวันนี้</strong></div>
            <div class="menu-card" onclick="showApp('historyApp'); renderHistory();"><span>📋</span><br><strong>ประวัติ/ส่งชีต</strong></div>
            <div class="menu-card" onclick="showApp('verifyApp')"><span>🔍</span><br><strong>เช็คเงิน <span id="pendingCount" style="color:red;">0</span></strong></div>
            <div class="menu-card" onclick="showApp('settingApp')"><span>⚙️</span><br><strong>ตั้งค่า</strong></div>
        </div>
    </div>

    <div id="queueApp" class="sub-app">
        <h3>💆‍♂️ ตารางนวด & จับเวลา</h3>
        <select id="staffSelect"></select>
        <input type="text" id="custNameQ" placeholder="ชื่อลูกค้า">
        <input type="number" id="custPriceQ" placeholder="ราคา (บาท)">
        <input type="number" id="custTimeQ" placeholder="เวลานวด (นาที)" value="60">
        <button onclick="addQueue()">📌 เพิ่มเข้าตาราง</button>
        <hr><div id="queueList"></div>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>

    <div id="paymentApp" class="sub-app">
        <h3>💰 บันทึกรับเงิน</h3>
        <select id="activeCustSelect" onchange="autoFillPay()"></select>
        <input type="text" id="custNamePay" placeholder="ชื่อลูกค้า">
        <input type="number" id="payAmount" oninput="updateQR()" style="font-size:30px; text-align:center;">
        <div style="display:flex; gap:10px;">
            <button onclick="setMethod('qr')" style="flex:1;">📱 โอน</button>
            <button onclick="setMethod('cash')" style="flex:1; background:#888;">💵 เงินสด</button>
        </div>
        <div id="qrZone" style="text-align:center; margin-top:15px; display:none;">
            <img id="qrcode" width="150">
        </div>
        <button onclick="confirmPayment()" style="background:var(--secondary); margin-top:20px;">ยืนยันแจ้งชำระ</button>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>

    <div id="reportApp" class="sub-app">
        <h3>📊 สรุปยอดรายวัน</h3>
        <div id="reportContent" style="text-align:left; line-height:1.8;"></div>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>

    <div id="historyApp" class="sub-app">
        <h3>📋 ประวัติวันนี้</h3>
        <button id="sheetBtn" onclick="sendToSheet()" style="background:#2E7D32; margin-bottom:15px;">📤 ส่งข้อมูลไป Google Sheet</button>
        <div id="historyList"></div>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>

    <div id="verifyApp" class="sub-app">
        <h3>🔍 รายการรอตรวจสอบ</h3>
        <div id="pendingList"></div>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>

    <div id="settingApp" class="sub-app">
        <h3>⚙️ ตั้งค่า</h3>
        <button onclick="localStorage.clear(); location.reload();" style="background:#333;">⚠️ ล้างข้อมูลทั้งหมด</button>
        <button onclick="showDashboard()" style="background:#f0f0f0; color:#888; margin-top:20px;">⬅️ กลับ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-BRWBtHvZTJL2rJlyKNJWGJujoXmubwlWPWwpiQ7Qi3jNtfICqgn_-jQriMoRrfuIKQ/exec";
    
    let staff = JSON.parse(localStorage.getItem('staffData')) || [{id:1,name:'หมอแดง'},{id:2,name:'หมอเขียว'},{id:3,name:'หมอฟ้า'}];
    let activeQueues = JSON.parse(localStorage.getItem('activeQueues')) || [];
    let history = JSON.parse(localStorage.getItem('massageHistory')) || [];
    let pending = JSON.parse(localStorage.getItem('pendingPayments')) || [];
    let grandTotal = parseInt(localStorage.getItem('grandTotal')) || 0;
    let payMethod = 'qr';

    function checkLogin() { if(document.getElementById('passInput').value === "123456") { document.getElementById('loginOverlay').style.display = "none"; document.getElementById('dashboard').style.display = 'block'; updateDashboard(); } }

    function updateDashboard() {
        document.getElementById('grandTotal').innerText = `฿${grandTotal}`;
        document.getElementById('pendingCount').innerText = pending.length;
    }

    function showApp(id) {
        document.getElementById('dashboard').style.display = 'none';
        document.querySelectorAll('.sub-app').forEach(a => a.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id==='queueApp') { updateStaffDrop(); renderQueueList(); }
        if(id==='paymentApp') updateActiveCustDrop();
    }

    function showDashboard() {
        document.querySelectorAll('.sub-app').forEach(a => a.style.display = 'none');
        document.getElementById('dashboard').style.display = 'block';
        updateDashboard();
    }

    // Timer Logic
    function startTimer(id, duration) {
        let q = activeQueues.find(x => x.id === id);
        if(q.startTime) return;
        q.startTime = Date.now();
        q.endTime = q.startTime + (duration * 60000);
        localStorage.setItem('activeQueues', JSON.stringify(activeQueues));
        renderQueueList();
    }

    setInterval(() => {
        let changed = false;
        activeQueues.forEach(q => {
            if(q.startTime && !q.alerted) {
                if(Date.now() >= q.endTime) {
                    alert(`⏰ หมดเวลา: คุณ ${q.n} (หมอ ${q.sn})`);
                    q.alerted = true;
                    changed = true;
                }
            }
        });
        if(changed) { localStorage.setItem('activeQueues', JSON.stringify(activeQueues)); renderQueueList(); }
    }, 1000);

    function addQueue() {
        let n=document.getElementById('custNameQ').value, sn=document.getElementById('staffSelect').value, p=document.getElementById('custPriceQ').value, t=document.getElementById('custTimeQ').value;
        if(!n||!p||!t) return alert("กรอกข้อมูลให้ครบ");
        activeQueues.push({id:Date.now(), n, sn, p, duration:t, alerted:false, startTime:null});
        localStorage.setItem('activeQueues', JSON.stringify(activeQueues));
        renderQueueList(); document.getElementById('custNameQ').value="";
    }

    function renderQueueList() {
        let list = document.getElementById('queueList'); list.innerHTML = "";
        activeQueues.forEach(q => {
            let timerHtml = q.startTime ? `<span class="timer-display">⏳ กำลังนวด...</span>` : `<button class="btn-start" onclick="startTimer(${q.id}, ${q.duration})">▶️ เริ่มนวด (${q.duration} นาที)</button>`;
            list.innerHTML += `<div class="item-card">
                <strong>👤 ${q.n}</strong> | ฿${q.p}<br><small>หมอ: ${q.sn}</small><br>${timerHtml}
                <button onclick="removeQueue(${q.id})" style="position:absolute; right:10px; top:10px; width:auto; padding:5px; background:red;">ลบ</button>
            </div>`;
        });
    }
    function removeQueue(id) { activeQueues = activeQueues.filter(q=>q.id!==id); localStorage.setItem('activeQueues', JSON.stringify(activeQueues)); renderQueueList(); }

    // Payment Logic
    function updateActiveCustDrop() { let s=document.getElementById('activeCustSelect'); s.innerHTML="<option value=''>-- เลือกคนจอง --</option>"; activeQueues.forEach(q=>s.innerHTML+=`<option value='${q.id}'>${q.n}</option>`); }
    function autoFillPay() { let id=document.getElementById('activeCustSelect').value; if(!id) return; let q=activeQueues.find(x=>x.id==id); document.getElementById('custNamePay').value=q.n; document.getElementById('payAmount').value=q.p; updateQR(); }
    function setMethod(m) { payMethod=m; document.getElementById('qrZone').style.display=m==='qr'?'block':'none'; updateQR(); }
    function updateQR() { let a=document.getElementById('payAmount').value; document.getElementById('qrcode').src=a>0?`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://promptpay.io/0863112536/${a}`:''; }

    function confirmPayment() {
        let a=parseInt(document.getElementById('payAmount').value), n=document.getElementById('custNamePay').value, qId=document.getElementById('activeCustSelect').value;
        if(!a||!n) return alert("กรอกยอดเงิน");
        let sn = qId ? activeQueues.find(x=>x.id==qId).sn : "ไม่ระบุ";
        pending.push({a, n, sn, method: payMethod, id: Date.now()});
        if(qId) activeQueues = activeQueues.filter(q=>q.id!=qId);
        localStorage.setItem('pendingPayments', JSON.stringify(pending));
        localStorage.setItem('activeQueues', JSON.stringify(activeQueues));
        alert("แจ้งรับเงินแล้ว! รอย่ายืนยันในหน้าเช็คเงิน"); showDashboard();
    }

    function verifyPayment(id) {
        let idx=pending.findIndex(p=>p.id===id), p=pending[idx];
        grandTotal += p.a;
        history.push({...p, com:Math.floor(p.a*0.4), date:new Date().toLocaleString()});
        pending.splice(idx,1);
        localStorage.setItem('grandTotal', grandTotal);
        localStorage.setItem('massageHistory', JSON.stringify(history));
        localStorage.setItem('pendingPayments', JSON.stringify(pending));
        showDashboard();
    }

    // Report & History
    function renderReport() {
        let report = `<b>💰 ยอดรวม:</b> ฿${grandTotal}<br><b>📊 จำนวนลูกค้า:</b> ${history.length} ท่าน<hr><b>ค่าคอมพนักงาน:</b><br>`;
        staff.forEach(s => {
            let sTotal = history.filter(h => h.sn === s.name).reduce((sum, h) => sum + h.com, 0);
            report += `- ${s.name}: ฿${sTotal}<br>`;
        });
        document.getElementById('reportContent').innerHTML = report;
    }

    function renderHistory() { let list=document.getElementById('historyList'); list.innerHTML=""; history.slice().reverse().forEach(h=>list.innerHTML+=`<div class="item-card">👤 ${h.n} | ฿${h.a} | หมอ ${h.sn}<br><small>${h.date}</small></div>`); }

    // Google Sheet Function
    async function sendToSheet() {
        let btn = document.getElementById('sheetBtn');
        btn.innerText = "กำลังส่ง... ห้ามปิดหน้าเว็บ";
        btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(history)
            });
            alert("ส่งข้อมูลเข้า Google Sheet สำเร็จแล้วเพื่อน!");
        } catch (e) { alert("ล้มเหลว! เช็คการ Deploy ใน Sheet หน่อย"); }
        finally { btn.innerText = "📤 ส่งข้อมูลไป Google Sheet"; btn.disabled = false; }
    }

    function updateStaffDrop() { let s=document.getElementById('staffSelect'); s.innerHTML=""; staff.forEach(x=>s.innerHTML+=`<option>${x.name}</option>`); }
    function renderPending() { let list=document.getElementById('pendingList'); list.innerHTML=pending.length===0?"<p>ไม่มีรายการ</p>":""; pending.forEach(p=>list.innerHTML+=`<div class="item-card">฿${p.a} | ${p.n}<br><button onclick="verifyPayment(${p.id})">✅ ยืนยันเงินเข้า</button></div>`); }
    function closeDay() { if(confirm("ปิดยอดวัน?")){ grandTotal=0; history=[]; localStorage.setItem('grandTotal',0); localStorage.setItem('massageHistory', JSON.stringify([])); showDashboard(); } }

    showDashboard();
</script>
</body>
</html>
