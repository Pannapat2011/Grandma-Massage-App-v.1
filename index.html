<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บ้านประคบทอง ไทย/สปา - POS REBORN</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #996515; --bg: #F9F5F0; --white: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        
        /* Login Section */
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .login-card { background: var(--white); padding: 30px; border-radius: 30px; width: 80%; text-align: center; border: 3px solid var(--gold); }
        
        /* Main UI */
        .card { background: var(--white); padding: 20px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; border: 1px solid #eee; }
        .summary-box { background: var(--white); border: 3px solid var(--gold); padding: 20px; border-radius: 30px; }
        .summary-box h1 { font-size: 40px; color: var(--dark); margin: 10px 0; }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: var(--white); padding: 20px; border-radius: 20px; border: none; border-bottom: 4px solid var(--gold); cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.2s; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn span { font-size: 30px; display: block; margin-bottom: 5px; }

        /* Input Styles */
        input, select, button.action-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 15px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: 'Sarabun'; }
        button.action-btn { background: linear-gradient(135deg, var(--dark), var(--gold)); color: white; border: none; font-weight: bold; font-size: 18px; }
        .sub-app { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* QR Zone */
        .qr-display { display: none; margin-top: 20px; padding: 15px; background: #fffde7; border-radius: 20px; border: 2px dashed var(--gold); }
        #qr-image { width: 220px; height: 220px; border: 5px solid #fff; border-radius: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" width="150">
        <h2 style="color:var(--dark)">บ้านประคบทอง</h2>
        <input type="password" id="pass" placeholder="รหัสผ่านเข้าสู่ระบบ">
        <button class="action-btn" onclick="login()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="container" id="main-app" style="display:none;">
    <div id="dashboard">
        <div style="text-align:center; margin-bottom:20px;">
            <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" width="100">
        </div>
        <div class="summary-box">
            <small>ยอดรายได้รวมวันนี้</small>
            <h1 id="total-display">฿0</h1>
            <button onclick="resetDay()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:10px; font-size:12px;">ปิดยอดวัน</button>
        </div>
        <div class="menu-grid" style="margin-top:20px;">
            <button class="menu-btn" onclick="go('queue-app')"><span>💆‍♂️</span><strong>ลงคิว</strong></button>
            <button class="menu-btn" onclick="go('pay-app')"><span>💰</span><strong>รับเงิน</strong></button>
            <button class="menu-btn" onclick="go('history-app')"><span>📋</span><strong>ประวัติ</strong></button>
            <button class="menu-btn" onclick="location.reload()"><span>⚙️</span><strong>ออก</strong></button>
        </div>
    </div>

    <div id="queue-app" class="sub-app">
        <div class="card">
            <h3>💆‍♂️ ลงตารางคิว</h3>
            <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
            <input type="number" id="q-price" placeholder="ราคา">
            <div style="display:flex; gap:10px;"><input type="time" id="q-f"> <span>ถึง</span> <input type="time" id="q-t"></div>
            <button class="action-btn" onclick="saveQueue()">📌 บันทึกคิว</button>
        </div>
        <div id="queue-list"></div>
        <button onclick="go('dashboard')" style="width:100%; padding:10px; border:none; background:none; color:#888;">⬅️ กลับหน้าหลัก</button>
    </div>

    <div id="pay-app" class="sub-app">
        <div class="card">
            <h3>💰 บันทึกรับเงิน</h3>
            <select id="q-select" onchange="autoFill()"></select>
            <input type="text" id="pay-name" placeholder="ชื่อลูกค้า">
            <input type="number" id="pay-amt" placeholder="จำนวนเงิน" oninput="genQR()" style="font-size:25px; text-align:center;">
            
            <div class="qr-display" id="qr-area">
                <img id="qr-image" src="" alt="สแกนเพื่อจ่ายเงิน">
                <p style="font-size:12px; color:#666;">สแกนโอนเข้าเบอร์: 086-352-6387</p>
            </div>

            <button class="action-btn" onclick="confirmPay()" style="margin-top:20px;">✅ ยืนยันเงินเข้า</button>
        </div>
        <button onclick="go('dashboard')" style="width:100%; padding:10px; border:none; background:none; color:#888;">⬅️ ยกเลิก</button>
    </div>

    <div id="history-app" class="sub-app">
        <div class="card">
            <h3>📋 ประวัติวันนี้</h3>
            <div id="hist-list"></div>
        </div>
        <button onclick="go('dashboard')" style="width:100%; padding:10px; border:none; background:none; color:#888;">⬅️ กลับหน้าหลัก</button>
    </div>
</div>

<script>
    let grandTotal = parseInt(localStorage.getItem('gt_v2')) || 0;
    let queues = JSON.parse(localStorage.getItem('q_v2')) || [];
    let history = JSON.parse(localStorage.getItem('h_v2')) || [];

    function login() { if(document.getElementById('pass').value === '123456') { document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block'; updateHome(); } }
    function go(id) { document.getElementById('dashboard').style.display='none'; document.querySelectorAll('.sub-app').forEach(a=>a.style.display='none'); document.getElementById(id).style.display='block'; if(id==='pay-app') updateQDrop(); if(id==='queue-app') renderQ(); if(id==='history-app') renderH(); }
    function updateHome() { document.getElementById('total-display').innerText = `฿${grandTotal}`; }

    // --- ระบบ QR Code (เบอร์ใหม่ 0863526387) ---
    function genQR() {
        let a = document.getElementById('pay-amt').value;
        let img = document.getElementById('qr-image');
        let area = document.getElementById('qr-area');
        if(a > 0) {
            // ใช้ PromptPay.io ตรงๆ พร้อมเบอร์ใหม่ และสุ่มเลขท้ายเพื่อล้าง Cache
            img.src = `https://promptpay.io/0863526387/${a}.png?v=${Date.now()}`;
            area.style.display = 'block';
        } else { area.style.display = 'none'; }
    }

    // --- ระบบจัดการคิว ---
    function saveQueue() {
        let n=document.getElementById('q-name').value, p=document.getElementById('q-price').value, f=document.getElementById('q-f').value, t=document.getElementById('q-t').value;
        if(!n||!p||!f||!t) return alert('ใส่ข้อมูลให้ครบนะจ๊ะ');
        queues.push({id:Date.now(), n, p, f, t});
        localStorage.setItem('q_v2', JSON.stringify(queues));
        renderQ(); document.getElementById('q-name').value='';
    }
    function renderQ() {
        let l = document.getElementById('queue-list'); l.innerHTML = '';
        queues.forEach(q => { l.innerHTML += `<div class="card" style="text-align:left;"><strong>⏰ ${q.f}-${q.t} | ${q.n}</strong><br><small>ราคา: ฿${q.p}</small></div>`; });
    }
    function updateQDrop() {
        let s = document.getElementById('q-select'); s.innerHTML = '<option value="">-- เลือกจากคิวจอง --</option>';
        queues.forEach(q => { s.innerHTML += `<option value="${q.id}">${q.n}</option>`; });
    }
    function autoFill() {
        let id = document.getElementById('q-select').value; if(!id) return;
        let q = queues.find(x=>x.id==id);
        document.getElementById('pay-name').value = q.n;
        document.getElementById('pay-amt').value = q.p;
        genQR();
    }

    // --- ระบบจ่ายเงิน ---
    function confirmPay() {
        let a = parseInt(document.getElementById('pay-amt').value);
        let n = document.getElementById('pay-name').value;
        let id = document.getElementById('q-select').value;
        if(!a || !n) return alert('กรอกชื่อและยอดเงินด้วยจ๊ะ');
        
        grandTotal += a; history.push({n, a, t: new Date().toLocaleTimeString()});
        if(id) queues = queues.filter(x=>x.id != id);
        
        localStorage.setItem('gt_v2', grandTotal); localStorage.setItem('h_v2', JSON.stringify(history)); localStorage.setItem('q_v2', JSON.stringify(queues));
        alert('บันทึกยอดเงินเรียบร้อย!'); go('dashboard'); updateHome();
    }

    function renderH() {
        let l = document.getElementById('hist-list'); l.innerHTML = '';
        history.slice().reverse().forEach(h => { l.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px; text-align:left;"><strong>${h.n}</strong> | ฿${h.a} <br><small>${h.t}</small></div>`; });
    }
    function resetDay() { if(confirm('ต้องการเริ่มวันใหม่ใช่ไหม?')) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
