<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประคบทอง - The Master Piece</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F0F2F5; --gold: #B8860B; --shd: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; --in: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; color: #1D1D1F; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; margin: auto; }
        .btn-neu { background: var(--bg); border: none; padding: 15px; border-radius: 20px; box-shadow: var(--shd); cursor: pointer; font-family: 'Kanit'; font-weight: 600; width: 100%; margin-top: 12px; transition: 0.2s; }
        .btn-neu:active { box-shadow: var(--in); transform: scale(0.98); }
        .btn-gold { background: var(--gold) !important; color: white !important; }
        .card { background: var(--bg); padding: 25px; border-radius: 35px; box-shadow: var(--in); text-align: center; margin-bottom: 25px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 16px; }
        th { background: var(--gold); color: white; padding: 12px 5px; font-size: 13px; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--bg); border-radius: 25px; margin-bottom: 12px; box-shadow: var(--shd); }
        .switch { position: relative; width: 50px; height: 26px; appearance: none; background: #d1d1d1; border-radius: 20px; outline: none; transition: 0.3s; cursor: pointer; }
        .switch:checked { background: var(--gold); }
        .switch::before { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; top: 3px; left: 3px; background: white; transition: 0.3s; }
        .switch:checked::before { left: 27px; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; justify-content: center; }
        .chip { padding: 8px 12px; border-radius: 15px; background: var(--bg); box-shadow: var(--shd); font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .chip.active { box-shadow: var(--in); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); }
        #qr-area { display: none; margin: 15px 0; text-align: center; }
        #qr-img { width: 220px; border: 10px solid white; border-radius: 20px; box-shadow: var(--shd); }
    </style>
</head>
<body onload="checkLogin()">

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div class="card" style="width:80%;">
        <h2 style="color:var(--gold);">ประคบทอง</h2>
        <input type="password" id="pass" placeholder="รหัสผ่าน" style="width:100%; padding:15px; border-radius:15px; border:none; box-shadow: var(--in); outline:none; text-align:center; background:var(--bg);">
        <button class="btn-neu btn-gold" onclick="auth()">เข้าสู่ระบบ</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="card"><small>ยอดเงินรวม Cloud (ทุกเครื่อง)</small><h2 id="total-val" style="font-size:38px; color:var(--gold);">฿0</h2></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn-neu" onclick="openP('p-q')">📅 ลงคิวจอง</button>
            <button class="btn-neu" onclick="openP('p-pay')">💰 รับเงิน/QR</button>
            <button class="btn-neu" onclick="openP('p-st')">🧘‍♂️ สถานะหมอ</button>
            <button class="btn-neu btn-gold" onclick="openP('p-list')">📜 รายการคิว</button>
            <button class="btn-neu" onclick="syncCloud()">🔄 ดึงข้อมูลใหม่</button>
            <button class="btn-neu" onclick="resetToday()" style="color:red;">⚠️ ล้างวันใหม่</button>
        </div>
    </div>

    <div id="p-list" class="page">
        <h3>รายการคิว (ลบได้ใช้รหัส)</h3>
        <div style="overflow-x:auto;"><table><thead><tr><th>ลูกค้า</th><th>หมอ</th><th>จ่าย</th><th>ลบ</th></tr></thead><tbody id="tb-list"></tbody></table></div>
        <button class="btn-neu btn-gold" onclick="openP('home')">กลับหน้าหลัก</button>
    </div>

    <div id="p-st" class="page"><h3>สถานะหมอนวด</h3><div id="st-list"></div><button class="btn-neu btn-gold" onclick="openP('home')">กลับหน้าหลัก</button></div>

    <div id="p-q" class="page">
        <h3>ลงคิวจอง</h3>
        <input type="text" id="qn" placeholder="ชื่อลูกค้า" class="btn-neu" style="background:white;">
        <div class="chip-group" id="prog-chips">
            <div class="chip active" onclick="selectType(this, 'thai')">นวดไทย</div>
            <div class="chip" onclick="selectType(this, 'foot')">นวดเท้า</div>
            <div class="chip" onclick="selectType(this, 'back')">รีดเส้น</div>
            <div class="chip" onclick="selectType(this, 'oil')">นวดน้ำมัน</div>
            <div class="chip" onclick="selectType(this, 'spa')">ขัดผิว</div>
            <div class="chip" onclick="selectType(this, 'face')">นวดหน้า</div>
            <div class="chip" onclick="selectType(this, 'herb')">อบสมุนไพร</div>
        </div>
        <div class="chip-group" id="dur-chips">
            <div class="chip" id="dur-30" onclick="selectDur(this, 30)">30น.</div>
            <div class="chip active" id="dur-60" onclick="selectDur(this, 60)">1ชม.</div>
            <div class="chip" id="dur-90" onclick="selectDur(this, 90)">1.5ชม.</div>
            <div class="chip" id="dur-120" onclick="selectDur(this, 120)">2ชม.</div>
        </div>
        <select id="qdr" class="btn-neu" style="background:white;"></select>
        <input type="number" id="qp" class="btn-neu" style="text-align:center; background:white; font-size:24px; color:var(--gold);">
        <button class="btn-neu btn-gold" onclick="saveQ()">บันทึกข้อมูล</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3>💰 ชำระเงิน</h3>
        <select id="psel" class="btn-neu" onchange="autoP()" style="background:white;"></select>
        <div class="chip-group">
            <div class="chip active" id="mqr" onclick="setM('qr')">📲 QR Code</div>
            <div class="chip" id="mcash" onclick="setM('cash')">💵 เงินสด</div>
        </div>
        <input type="number" id="pa" placeholder="ยอดเงิน" class="btn-neu" style="text-align:center; font-size:30px; background:white;" oninput="genQR()">
        <div id="qr-area"><img id="qr-img" src=""><p id="pp-txt" style="font-weight:bold; font-size:12px;"></p></div>
        <button class="btn-neu btn-gold" onclick="confirmPay()">ยืนยันรับเงิน</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJlg4KO3oK3HbFvw3DcH0r_amC9jvFCAefeTVVv5GddE7W3UBPzWRIwMQK4h9nMjMGlg/exec";
    let db = { total:0, qs:[], drs:[], pp:'0863526387' };
    
    // 🚩 ตารางราคาฐานตามรูป
    const priceTable = {
        'thai': { 60: 250, 90: 400, 120: 500 },
        'foot': { 60: 300 },
        'back': { 60: 300, 90: 450, 120: 600 },
        'oil':  { 60: 400 },
        'spa':  { 60: 700 },
        'face': { 60: 400 },
        'herb': { 30: 200 }
    };

    let curType = 'thai', curDur = 60, payMode = 'qr';

    function auth() { if(document.getElementById('pass').value==='123456'){ localStorage.setItem('isL','t'); location.reload(); } }
    function checkLogin() { if(localStorage.getItem('isL')==='t'){ document.getElementById('login-overlay').style.display='none'; document.getElementById('app').style.display='block'; syncCloud(); } }

    async function syncCloud() {
        try {
            const r = await fetch(SCRIPT_URL + "?t=" + Date.now());
            db = await r.json();
            updateUI();
        } catch(e) { alert("ซิงค์ล้มเหลว!"); }
    }

    async function pushCloud(log = null) {
        try {
            await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({...db, log}) });
            setTimeout(syncCloud, 800);
        } catch(e) { alert("ส่งข้อมูลไม่สำเร็จ!"); }
    }

    function selectType(el, type) {
        document.querySelectorAll('#prog-chips .chip').forEach(c=>c.classList.remove('active'));
        el.classList.add('active'); curType = type;
        
        // กรองตัวเลือกเวลาตามที่สั่ง
        ['dur-30','dur-60','dur-90','dur-120'].forEach(id=>document.getElementById(id).style.display='none');
        if(type === 'herb') {
            ['dur-30','dur-60','dur-120'].forEach(id=>document.getElementById(id).style.display='inline-block');
            selectDur(document.getElementById('dur-30'), 30);
        } else if(type === 'thai' || type === 'back') {
            ['dur-60','dur-90','dur-120'].forEach(id=>document.getElementById(id).style.display='inline-block');
            selectDur(document.getElementById('dur-60'), 60);
        } else {
            ['dur-60','dur-120'].forEach(id=>document.getElementById(id).style.display='inline-block');
            selectDur(document.getElementById('dur-60'), 60);
        }
    }

    function selectDur(el, dur) {
        document.querySelectorAll('#dur-chips .chip').forEach(c=>c.classList.remove('active'));
        el.classList.add('active'); curDur = dur; updatePrice();
    }

    function updatePrice() {
        let table = priceTable[curType];
        let price = 0;
        if(table[curDur]) {
            price = table[curDur];
        } else {
            // Logic คูณราคาอัตโนมัติถ้าไม่มีในตารางพิเศษ
            if(curDur === 120) price = table[60] * 2;
            if(curDur === 60 && curType === 'herb') price = table[30] * 2;
        }
        document.getElementById('qp').value = price;
    }

    function saveQ() {
        let n = document.getElementById('qn').value, dr = document.getElementById('qdr').value, p = document.getElementById('qp').value;
        if(!n || !dr) return alert('กรอกชื่อลูกค้าและหมอ!');
        db.qs.push({id:Date.now(), n, dr, p, t:curType, paid:false});
        let i = db.drs.findIndex(x=>x.n===dr); if(i!==-1) db.drs[i].st='busy';
        pushCloud(); openP('home');
    }

    function deleteQ(id) {
        if(prompt("ใส่รหัสเพื่อลบรายการ") === "123456") {
            db.qs = db.qs.filter(q => q.id !== id);
            pushCloud();
        } else { alert("รหัสผิด!"); }
    }

    function setM(m) { payMode = m; document.getElementById('mqr').classList.toggle('active', m==='qr'); document.getElementById('mcash').classList.toggle('active', m==='cash'); genQR(); }
    function genQR() {
        let a = document.getElementById('pa').value; let d = document.getElementById('qr-area');
        if(payMode==='qr' && a > 0) {
            document.getElementById('qr-img').src = `https://promptpay.io/${db.pp}/${a}.png?t=${Date.now()}`;
            document.getElementById('pp-txt').innerText = "พร้อมเพย์: "+db.pp; d.style.display = 'block';
        } else { d.style.display = 'none'; }
    }

    async function confirmPay() {
        let id = document.getElementById('psel').value, a = document.getElementById('pa').value;
        let qIdx = db.qs.findIndex(x=>x.id==id); if(qIdx===-1) return;
        let q = db.qs[qIdx];
        let log = { date: new Date().toLocaleDateString('th-TH'), time: new Date().toLocaleTimeString('th-TH'), n: q.n, dr: q.dr, a: a, mode: payMode };
        db.total += parseInt(a); db.qs[qIdx].paid = true;
        let di = db.drs.findIndex(x=>x.n===q.dr); if(di!==-1) db.drs[di].st='free';
        await pushCloud(log); openP('home');
    }

    function updateUI() {
        document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`;
        document.getElementById('tb-list').innerHTML = db.qs.map(q=>`<tr><td>${q.n}</td><td>${q.dr}</td><td>${q.paid?'✅':'⏳'}</td><td><button onclick="deleteQ(${q.id})" style="border:none; background:none; cursor:pointer;">🗑️</button></td></tr>`).join('');
        document.getElementById('st-list').innerHTML = db.drs.map(d=>`<div class="switch-container"><strong>${d.n}</strong><input type="checkbox" class="switch" ${d.st==='busy'?'checked':''} onchange="toggleDR('${d.n}')"></div>`).join('');
        document.getElementById('psel').innerHTML = '<option value="">-- เลือกคิว --</option>'+db.qs.filter(x=>!x.paid).map(q=>`<option value="${q.id}">${q.n} (${q.p}.-)</option>`).join('');
        document.getElementById('qdr').innerHTML = db.drs.map(d=>`<option value="${d.n}">${d.n} (${d.st==='free'?'ว่าง':'ไม่ว่าง'})</option>`).join('');
    }

    function toggleDR(name) { let i = db.drs.findIndex(d=>d.n===name); if(i!==-1) { db.drs[i].st = (db.drs[i].st === 'free') ? 'busy' : 'free'; pushCloud(); } }
    function autoP() { let q = db.qs.find(x=>x.id==document.getElementById('psel').value); if(q) { document.getElementById('pa').value=q.p; genQR(); } }
    function openP(id) { document.querySelectorAll('.page, #home').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; if(id==='home') syncCloud(); }
    function resetToday() { if(confirm("เริ่มวันใหม่?")){ db.total=0; db.qs=[]; pushCloud(); } }
</script>
</body>
</html>
