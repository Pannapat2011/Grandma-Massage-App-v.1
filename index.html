<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประคบทองไทยสปา - Pro Max POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-dark: #EFE6D5;
            --cream-light: #FDFBF2;
            --cream-soft: #F5EEDC;
            --gold-primary: #996515;
            --gold-soft: #D4AF37;
            --text-main: #433D35;
            --text-sub: #8E8474;
            --white: #FFFFFF;
            --shadow: 0 10px 30px rgba(153, 101, 21, 0.1);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream-dark);
            margin: 0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🔒 Login Pro Max */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--cream-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            width: 85%;
            text-align: center;
            background: var(--white);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--white);
        }

        /* 🏠 Dashboard UI */
        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-header img { width: 110px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1)); }
        .brand-header h1 { font-size: 26px; margin: 10px 0 0; color: var(--gold-primary); font-weight: 700; letter-spacing: 0.5px; }

        .main-card {
            background: var(--white);
            padding: 40px 24px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--gold-soft), var(--gold-primary));
        }

        .main-card h2 { font-size: 48px; margin: 10px 0; color: var(--gold-primary); font-weight: 700; }

        /* 🔘 Grid Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .menu-item {
            background: var(--white);
            padding: 28px 16px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .menu-item:active { transform: scale(0.9); background: var(--cream-soft); }
        .menu-item span { font-size: 36px; display: block; margin-bottom: 12px; }
        .menu-item strong { font-size: 16px; font-weight: 600; color: var(--text-main); }

        /* 📄 Sub-Page Pro Max */
        .page { display: none; background: var(--white); padding: 32px 24px; border-radius: 40px; box-shadow: var(--shadow); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h3 { font-size: 22px; color: var(--gold-primary); font-weight: 700; margin-top: 0; margin-bottom: 24px; text-align: center; }

        input, select, button.btn-pro {
            width: 100%; padding: 18px; margin-top: 16px; border-radius: 20px;
            border: 1.5px solid var(--cream-dark); background: var(--cream-light); font-size: 16px; 
            font-family: 'Sarabun'; box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--gold-soft); outline: none; background: #FFF; }

        button.btn-pro { 
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-soft)); 
            color: #fff; border: none; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px rgba(153, 101, 21, 0.2);
        }

        .list-item {
            padding: 20px; background: var(--cream-light); border-radius: 24px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        #qr-container { 
            display: none; text-align: center; margin-top: 30px; 
            padding: 24px; background: #FFF; border-radius: 32px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        #qr-img { width: 220px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" width="110">
        <h2 style="color:var(--gold-primary); margin-top:15px; font-weight:700;">PRO MAX POS</h2>
        <input type="text" id="user-input" placeholder="Username">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn-pro" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="brand-header">
            <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png">
            <h1>ประคบทองไทยสปา</h1>
        </div>

        <div class="main-card">
            <small style="color:var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; font-weight:600;">Daily Revenue</small>
            <h2 id="total-val">฿0</h2>
            <div style="font-size:13px; margin-top:15px; color: var(--text-sub); font-weight:400;">
                <span id="current-user"></span> | Pending: <b id="wait-count" style="color:#D32F2F;">0</b>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('p-queue')"><span>📅</span><strong>ลงคิว</strong></div>
            <div class="menu-item" onclick="openPage('p-pay')"><span>💰</span><strong>รับเงิน</strong></div>
            <div class="menu-item" onclick="openPage('p-verify')"><span>🔍</span><strong>เช็คยอด</strong></div>
            <div class="menu-item" onclick="openPage('p-hist')"><span>📋</span><strong>ประวัติ</strong></div>
        </div>
        
        <button onclick="if(confirm('Logout?')) location.reload();" style="background:none; border:none; color:var(--text-sub); width:100%; margin-top:50px; font-size:12px; cursor:pointer; opacity:0.5;">LOGOUT SYSTEM</button>
    </div>

    <div id="p-queue" class="page">
        <h3>Booking Schedule</h3>
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="q-price" placeholder="ราคาบริการ (บาท)">
        <div style="display:flex; gap:12px;"><input type="time" id="q-s"><input type="time" id="q-e"></div>
        <button class="btn-pro" onclick="addQ()">บันทึกคิวใหม่</button>
        <div id="q-list" style="margin-top:25px;"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:var(--text-sub); width:100%; margin-top:20px; font-weight:600;">BACK TO HOME</button>
    </div>

    <div id="p-pay" class="page">
        <h3>Payment Settlement</h3>
        <select id="pay-select" onchange="autoPay()"></select>
        <input type="text" id="pay-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="pay-amt" placeholder="0" oninput="genQR()" style="font-size:40px; text-align:center; border:none; border-bottom:3px solid var(--gold-primary); background:none; color:var(--gold-primary); font-weight:700;">
        <div id="qr-container">
            <img id="qr-img" src="">
            <p style="font-size:14px; color:var(--gold-primary); margin-top:15px; font-weight:600;">PromptPay: <span id="display-pp"></span></p>
        </div>
        <button class="btn-pro" onclick="submitPay()" style="margin-top:25px;">ยืนยันการโอนเงิน</button>
        <button onclick="openPage('home')" style="background:none; border:none; color:var(--text-sub); width:100%; margin-top:20px; font-weight:600;">CANCEL</button>
    </div>

    <div id="p-verify" class="page">
        <h3>Verification Required</h3>
        <div id="v-list"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:var(--text-sub); width:100%; margin-top:20px; font-weight:600;">BACK TO HOME</button>
    </div>

    <div id="p-hist" class="page">
        <h3>Transaction History</h3>
        <div id="hist-list"></div>
        <button onclick="openPage('home')" style="background:none; border:none; color:var(--text-sub); width:100%; margin-top:20px; font-weight:600;">BACK TO HOME</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-BRWBtHvZTJL2rJlyKNJWGJujoXmubwlWPWwpiQ7Qi3jNtfICqgn_-jQriMoRrfuIKQ/exec";
    
    let activePP = "0863526387";
    let db = {
        total: parseInt(localStorage.getItem('bpt_total')) || 0,
        queues: JSON.parse(localStorage.getItem('bpt_queues')) || [],
        wait: JSON.parse(localStorage.getItem('bpt_wait')) || [],
        history: JSON.parse(localStorage.getItem('bpt_history')) || []
    };

    function handleAuth() {
        let user = document.getElementById('user-input').value;
        let pass = document.getElementById('pass-input').value;
        if (user === 'admin2' && pass === '123456') {
            activePP = "0812799119";
            document.getElementById('current-user').innerText = "ADMIN 2";
            loginDone();
        } else if (pass === '123456') {
            activePP = "0863526387";
            document.getElementById('current-user').innerText = user.toUpperCase() || "ADMIN 1";
            loginDone();
        } else { alert('รหัสผ่านไม่ถูกต้อง'); }
    }

    function loginDone() {
        document.getElementById('login-overlay').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('display-pp').innerText = activePP;
        updateUI();
    }

    function openPage(id) { 
        document.getElementById('home').style.display='none'; 
        document.querySelectorAll('.page').forEach(p=>p.style.display='none'); 
        document.getElementById(id).style.display='block'; 
        if(id==='p-queue')renderQ(); if(id==='p-pay')updateDrop(); if(id==='p-verify')renderV(); if(id==='p-hist')renderH(); 
    }

    function updateUI() { 
        document.getElementById('total-val').innerText=`฿${db.total.toLocaleString()}`; 
        document.getElementById('wait-count').innerText=db.wait.length; 
    }

    function genQR() {
        let a = document.getElementById('pay-amt').value;
        if(a > 0) {
            document.getElementById('qr-img').src = `https://promptpay.io/${activePP}/${a}.png?t=${Date.now()}`;
            document.getElementById('qr-container').style.display='block';
        } else document.getElementById('qr-container').style.display='none';
    }

    function addQ() {
        let n=document.getElementById('q-name').value, p=document.getElementById('q-price').value, s=document.getElementById('q-s').value, e=document.getElementById('q-e').value;
        if(!n||!p) return;
        db.queues.push({id:Date.now(), n, p, s, e}); save(); renderQ();
        document.getElementById('q-name').value = ''; document.getElementById('q-price').value = '';
    }

    function renderQ() {
        let l=document.getElementById('q-list'); l.innerHTML='';
        db.queues.forEach(q => { l.innerHTML+=`<div class="list-item"><div><strong style="font-size:16px;">${q.n}</strong><br><small style="color:var(--text-sub);">${q.s} - ${q.e}</small></div><div style="color:var(--gold-primary); font-weight:700; font-size:18px;">฿${q.p} <span onclick="delQ(${q.id})" style="color:#D32F2F; margin-left:12px; cursor:pointer;">×</span></div></div>`; });
    }
    function delQ(id) { if(confirm('ลบคิวนี้?')){ db.queues=db.queues.filter(x=>x.id!==id); save(); renderQ(); } }

    function updateDrop() {
        let s = document.getElementById('pay-select'); s.innerHTML='<option value="">-- เลือกจากตารางคิว --</option>';
        db.queues.forEach(q => s.innerHTML+=`<option value="${q.id}">${q.n}</option>`);
    }

    function autoPay() { 
        let id=document.getElementById('pay-select').value; if(!id)return; 
        let q=db.queues.find(x=>x.id==id); document.getElementById('pay-name').value=q.n; document.getElementById('pay-amt').value=q.p; genQR(); 
    }

    function submitPay() {
        let a=parseInt(document.getElementById('pay-amt').value), n=document.getElementById('pay-name').value, qId=document.getElementById('pay-select').value;
        if(!a||!n) return alert('กรอกชื่อและยอดเงิน');
        db.wait.push({id:Date.now(), n, a, qId});
        if(qId) db.queues=db.queues.filter(x=>x.id!=qId);
        save(); alert('บันทึกเรียบร้อย! รอยืนยันเงินเข้า'); openPage('home'); updateUI();
    }

    function renderV() {
        let l=document.getElementById('v-list'); l.innerHTML=db.wait.length?'':'<p style="text-align:center; opacity:0.4; margin-top:40px;">ไม่มีรายการรอยืนยัน</p>';
        db.wait.forEach(v => { l.innerHTML+=`<div class="list-item"><div><strong style="font-size:16px;">${v.n}</strong><br><b style="color:var(--gold-primary)">฿${v.a}</b></div><button onclick="confirmV(${v.id})" style="background:var(--gold-primary); color:#fff; border:none; padding:12px 20px; border-radius:16px; font-size:13px; font-weight:600; cursor:pointer;">CONFIRM</button></div>`; });
    }

    async function confirmV(id) {
        let v = db.wait.find(x => x.id === id);
        let record = { date: new Date().toLocaleDateString('th-TH'), time: new Date().toLocaleTimeString('th-TH'), n: v.n, a: v.a, user: document.getElementById('current-user').innerText };
        db.total += v.a; db.history.push(record); db.wait = db.wait.filter(x => x.id !== id);
        save(); updateUI(); renderV();
        try { fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify([record]) }); } catch (e) {}
    }

    function renderH() {
        let l=document.getElementById('hist-list'); l.innerHTML='';
        db.history.slice().reverse().forEach(h => { l.innerHTML+=`<div class="list-item"><div><strong>${h.n}</strong><br><small style="color:var(--text-sub);">${h.time}</small></div><div style="font-weight:700; color:var(--text-main);">฿${h.a}</div></div>`; });
    }

    function save() { 
        localStorage.setItem('bpt_total', db.total); localStorage.setItem('bpt_queues', JSON.stringify(db.queues)); localStorage.setItem('bpt_wait', JSON.stringify(db.wait)); localStorage.setItem('bpt_history', JSON.stringify(db.history)); 
    }
</script>
</body>
</html>
