<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประคบทอง - Cloud Sync Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F0F2F5; --gold: #B8860B; --shd: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; --in: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; color: #1D1D1F; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; margin: auto; }
        .btn-neu { background: var(--bg); border: none; padding: 15px; border-radius: 20px; box-shadow: var(--shd); cursor: pointer; font-family: 'Kanit'; font-weight: 600; width: 100%; margin-top: 12px; }
        .btn-neu:active { box-shadow: var(--in); transform: scale(0.98); }
        .btn-gold { background: var(--gold) !important; color: white !important; }
        .card { background: var(--bg); padding: 25px; border-radius: 35px; box-shadow: var(--in); text-align: center; margin-bottom: 25px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; font-size: 16px; }
        th { background: var(--gold); color: white; padding: 15px 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid #eee; text-align: center; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--bg); border-radius: 25px; margin-bottom: 12px; box-shadow: var(--shd); }
        .free-txt { color: #28a745; font-weight: bold; }
        .busy-txt { color: #dc3545; font-weight: bold; }
        #loading-ui { position: fixed; top: 0; left: 0; right: 0; background: var(--gold); color: white; text-align: center; font-size: 12px; padding: 5px; display: none; z-index: 10000; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; justify-content: center; }
        .chip { padding: 8px 12px; border-radius: 15px; background: var(--bg); box-shadow: var(--shd); font-size: 12px; cursor: pointer; }
        .chip.active { box-shadow: var(--in); color: var(--gold); font-weight: bold; border: 1px solid var(--gold); }
    </style>
</head>
<body onload="checkLogin()">

<div id="loading-ui">กำลังซิงค์ข้อมูล Cloud...</div>

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div class="card" style="width:80%;">
        <h2 style="color:var(--gold);">ประคบทอง Admin</h2>
        <input type="password" id="pass" placeholder="รหัสผ่าน 123456" style="width:100%; padding:15px; border-radius:15px; border:none; box-shadow: var(--in); outline:none; text-align:center; background:var(--bg);">
        <button class="btn-neu btn-gold" onclick="auth()">LOGIN</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div class="card"><small>รายได้รวมวันนี้ (Cloud)</small><h2 id="total-val" style="font-size:38px; color:var(--gold);">฿0</h2></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn-neu" onclick="openP('p-q')">📅 ลงคิวจอง</button>
            <button class="btn-neu" onclick="openP('p-pay')">💰 รับเงิน</button>
            <button class="btn-neu" onclick="openP('p-st')">🧘‍♂️ สถานะหมอ</button>
            <button class="btn-neu btn-gold" onclick="openP('p-list')">📜 รายการคิว</button>
            <button class="btn-neu" onclick="syncCloud()">🔄 อัปเดตข้อมูล</button>
            <button class="btn-neu" onclick="resetData()" style="color:red;">⚠️ เริ่มวันใหม่</button>
        </div>
    </div>

    <div id="p-list" class="page">
        <h3>รายการคิว (ตัวใหญ่)</h3>
        <div style="overflow-x:auto;"><table><thead><tr><th>ลูกค้า</th><th>เริ่ม</th><th>เสร็จ</th><th>จ่าย</th></tr></thead><tbody id="tb-list"></tbody></table></div>
        <button class="btn-neu btn-gold" onclick="openP('home')">กลับหน้าหลัก</button>
    </div>

    <div id="p-st" class="page">
        <h3>สถานะหมอนวด</h3>
        <div id="st-list"></div>
        <button class="btn-neu btn-gold" onclick="openP('home')">กลับหน้าหลัก</button>
    </div>

    <div id="p-q" class="page">
        <h3>จองคิว</h3>
        <input type="text" id="qn" placeholder="ชื่อลูกค้า" class="btn-neu" style="background:white;">
        <select id="qdr" class="btn-neu" style="background:white;"></select>
        <input type="number" id="qp" placeholder="ราคา" class="btn-neu" style="background:white; text-align:center; font-size:20px;">
        <button class="btn-neu btn-gold" onclick="saveQ()">บันทึกข้อมูล</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3>รับเงิน</h3>
        <select id="psel" class="btn-neu" style="background:white;"></select>
        <input type="number" id="pa" class="btn-neu" style="text-align:center; font-size:24px; background:white;">
        <button class="btn-neu btn-gold" onclick="pay()">ยืนยันรับเงิน</button>
        <button class="btn-neu" onclick="openP('home')">กลับ</button>
    </div>
</div>

<script>
    // 🚩 เปลี่ยน URL ตรงนี้เป็น URL /exec ของมึงนะเพื่อน
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS3acLTKEmqAutw19YgnUfs3viIZwLNF0me2nfM9ck4KyJv-Ulk8DAb5m3G12FtVQeFA/exec";
    
    let db = { total:0, qs:[], drs:[], hist:[], pp:'' };

    function auth() { if(document.getElementById('pass').value==='123456'){ localStorage.setItem('isL','t'); location.reload(); } }
    function checkLogin() { if(localStorage.getItem('isL')==='t'){ document.getElementById('login-overlay').style.display='none'; document.getElementById('app').style.display='block'; syncCloud(); } }

    async function syncCloud() {
        document.getElementById('loading-ui').style.display = 'block';
        try {
            const resp = await fetch(SCRIPT_URL + "?t=" + Date.now());
            db = await resp.json();
            updateUI();
        } catch(e) { alert("ซิงค์ล้มเหลว เช็กเน็ตหรือการตั้งค่า Deployment!"); }
        document.getElementById('loading-ui').style.display = 'none';
    }

    async function saveCloud(logData = null) {
        document.getElementById('loading-ui').style.display = 'block';
        try {
            await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({...db, log: logData}) });
            setTimeout(syncCloud, 1000);
        } catch(e) { alert("ส่งข้อมูลไม่สำเร็จ!"); }
    }

    function saveQ() {
        let n = document.getElementById('qn').value, dr = document.getElementById('qdr').value, p = document.getElementById('qp').value;
        if(!n || !dr || !p) return alert('กรอกให้ครบ!');
        db.qs.push({id:Date.now(), n, dr, p, t:'รอเริ่ม', e:'รอเริ่ม', paid:false});
        let i = db.drs.findIndex(x=>x.n===dr); if(i!==-1) db.drs[i].st='busy';
        saveCloud();
        openP('home');
    }

    async function pay() {
        let id = document.getElementById('psel').value, a = document.getElementById('pa').value;
        let qIdx = db.qs.findIndex(x=>x.id==id); if(qIdx===-1) return;
        let q = db.qs[qIdx];
        let log = { date: new Date().toLocaleDateString('th-TH'), time: new Date().toLocaleTimeString('th-TH'), n: q.n, dr: q.dr, a: a, mode: 'qr' };
        db.total += parseInt(a);
        db.qs[qIdx].paid = true;
        let di = db.drs.findIndex(x=>x.n===q.dr); if(di!==-1) db.drs[di].st='free';
        await saveCloud(log);
        openP('home');
    }

    function updateUI() {
        document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`;
        document.getElementById('tb-list').innerHTML = db.qs.map(q=>`<tr><td>${q.n}</td><td>${q.t}</td><td>${q.e}</td><td>${q.paid?'✅':'⏳'}</td></tr>`).join('');
        document.getElementById('st-list').innerHTML = db.drs.map(d=>`<div class="switch-container"><strong>${d.n}</strong> <span class="${d.st==='free'?'free-txt':'busy-txt'}">(${d.st==='free'?'ว่าง':'ไม่ว่าง'})</span></div>`).join('');
        document.getElementById('psel').innerHTML = '<option value="">-- เลือกคิว --</option>'+db.qs.filter(x=>!x.paid).map(q=>`<option value="${q.id}">${q.n}</option>`).join('');
        document.getElementById('qdr').innerHTML = db.drs.filter(d=>d.st==='free').map(d=>`<option value="${d.n}">${d.n}</option>`).join('');
    }

    function openP(id) { 
        document.querySelectorAll('.page, #home').forEach(p=>p.style.display='none'); 
        document.getElementById(id).style.display='block';
        if(id === 'home') syncCloud();
    }

    function resetData() {
        if(confirm("ล้างข้อมูลรายได้และคิวทั้งหมดเพื่อเริ่มวันใหม่?")){
            db.total = 0; db.qs = []; db.hist = [];
            db.drs.forEach(d => d.st = 'free');
            saveCloud();
        }
    }
</script>
</body>
</html>
