<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประคบทอง - OriginOS 6 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --os-bg: #F0F2F5; 
            --os-card: rgba(255, 255, 255, 0.95); 
            --os-gold: #B8860B; 
            --os-text: #1D1D1F;
            --os-shadow: 0 10px 30px rgba(0,0,0,0.06);
            --os-blur: blur(25px);
            --danger: #FF3B30; --success: #34C759;
        }
        
        body { font-family: 'Sarabun', sans-serif; background: var(--os-bg); margin: 0; color: var(--os-text); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }

        /* 🔒 Login */
        #login-overlay { position: fixed; inset: 0; background: var(--os-bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { width: 85%; background: var(--os-card); padding: 40px 30px; border-radius: 45px; box-shadow: var(--os-shadow); text-align: center; border: 1px solid #fff; }

        /* 🏰 Home & Widgets */
        .balance-card { 
            background: linear-gradient(145deg, #ffffff, #f5f5f7); 
            padding: 30px 20px; border-radius: 45px; text-align: center; 
            margin-bottom: 20px; box-shadow: var(--os-shadow); border: 1px solid rgba(255,255,255,0.8);
        }
        .balance-card h2 { font-family: 'Kanit'; font-size: 48px; margin: 5px 0; color: var(--os-gold); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { 
            background: var(--os-card); padding: 20px 10px; border-radius: 35px; 
            cursor: pointer; text-align: center; transition: 0.2s; box-shadow: 2px 4px 12px rgba(0,0,0,0.03);
        }
        .menu-item:active { transform: scale(0.92); background: #eee; }
        .menu-item span { font-size: 28px; display: block; margin-bottom: 5px; }
        .menu-item strong { font-family: 'Kanit'; font-size: 14px; color: #444; }

        /* 📄 Pages */
        .page { display: none; background: var(--os-card); padding: 25px; border-radius: 45px; box-shadow: var(--os-shadow); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input, select, button.btn-os { 
            width: 100%; padding: 15px; margin-top: 10px; border-radius: 20px; 
            border: 1px solid #E5E5EA; background: #fbfbfd; font-size: 16px; box-sizing: border-box; outline: none;
        }
        button.btn-os { background: var(--os-gold); color: #FFF; border: none; font-weight: 700; cursor: pointer; font-family: 'Kanit'; }

        /* 👨‍⚕️ Lists & Badges */
        .dr-item { padding: 15px; background: #fff; border-radius: 25px; margin-bottom: 8px; border: 1px solid #f0f0f2; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 11px; padding: 4px 12px; border-radius: 12px; color: white; font-weight: bold; }
        .bg-free { background: var(--success); } .bg-busy { background: var(--danger); }
        .list-item { padding: 15px; background: #fff; border-radius: 25px; margin-bottom: 10px; border: 1px solid #eee; font-size: 13px; }
        
        .logo-img { width: 70px; border-radius: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-img">
        <h2 style="font-family:'Kanit'; color:var(--os-gold); margin-bottom:20px;">Unlock OriginOS</h2>
        <input type="text" id="user-input" placeholder="User (admin/admin2)">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn-os" onclick="handleAuth()">Sign In</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div style="text-align:center; margin-bottom:15px;"><img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-img"></div>
        <div class="balance-card">
            <small>TODAY'S REVENUE (<span id="user-label"></span>)</small>
            <h2 id="total-val">฿0</h2>
            <div style="font-size:12px; opacity:0.6;">PROMPTPAY: <span id="pp-label" style="font-weight:700;"></span></div>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('p-dr-status')"><span>👨‍⚕️</span><strong>สถานะหมอ</strong></div>
            <div class="menu-item" onclick="openPage('p-queue')"><span>📅</span><strong>ลงคิวจอง</strong></div>
            <div class="menu-item" onclick="openPage('p-pay')"><span>💰</span><strong>รับชำระเงิน</strong></div>
            <div class="menu-item" onclick="openPage('p-verify')"><span>🔍</span><strong>ตรวจสอบยอด</strong></div>
            <div class="menu-item" onclick="openPage('p-summary')"><span>📊</span><strong>สรุปรายงาน</strong></div>
            <div class="menu-item" onclick="openPage('p-settings')"><span>⚙️</span><strong>ตั้งค่าระบบ</strong></div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#AAA; width:100%; margin-top:35px; cursor:pointer; font-size:12px;">LOGOUT SYSTEM</button>
    </div>

    <div id="p-dr-status" class="page">
        <h3 style="text-align:center;">Staff Status</h3>
        <div id="dr-status-list"></div>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93;">กลับหน้าหลัก</button>
    </div>

    <div id="p-queue" class="page">
        <h3>ลงตารางจองคิว</h3>
        <input type="date" id="q-date">
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า">
        <select id="q-type">
            <option value="นวดไทย">นวดไทย</option>
            <option value="นวดไทยประคบ">นวดไทยประคบ</option>
            <option value="นวดไทยออย">นวดไทยออย</option>
            <option value="นวดสปา+ขัดผิว">นวดสปา+ขัดผิว</option>
            <option value="นวดฝ่าเท้า">นวดฝ่าเท้า</option>
            <option value="นวดแก้อาการ">นวดแก้อาการ</option>
            <option value="นวดหน้าสมุนไพร">นวดหน้าสมุนไพร</option>
        </select>
        <select id="q-doctor-select"></select>
        <input type="number" id="q-price" placeholder="ระบุราคา">
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="time" id="q-s" style="margin:0;"> <span>ถึง</span> <input type="time" id="q-e" style="margin:0;">
        </div>
        <button class="btn-os" onclick="addQ()">บันทึกคิวใหม่</button>
        <hr><div id="q-list"></div>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93;">กลับ</button>
    </div>

    <div id="p-pay" class="page">
        <h3>รับเงิน / Generate QR</h3>
        <select id="pay-select" onchange="autoPay()"></select>
        <input type="text" id="pay-name" placeholder="ชื่อลูกค้า">
        <input type="number" id="pay-amt" placeholder="0" oninput="genQR()" style="font-size:35px; text-align:center; color:var(--os-gold); font-weight:bold; border:none; background:none;">
        <div id="qr-container" style="text-align:center; display:none;"><img id="qr-img" style="width:180px;"><p id="pp-text" style="font-size:12px;"></p></div>
        <button class="btn-os" onclick="submitPay()">ยืนยันยอดเข้า</button>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93;">กลับ</button>
    </div>

    <div id="p-verify" class="page">
        <h3>ยืนยันข้อมูลลงชีท</h3>
        <div id="v-list"></div>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93;">กลับ</button>
    </div>

    <div id="p-summary" class="page">
        <h3>สรุปรายงานยอดเงิน</h3>
        <div class="dr-item"><span>รายได้วันนี้</span><strong id="sum-day">฿0</strong></div>
        <button class="btn-os" style="background:var(--danger);" onclick="resetToZero()">รีเซ็ตยอดหน้าแรกเป็น 0</button>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93; margin-top:15px;">กลับ</button>
    </div>

    <div id="p-settings" class="page">
        <h3>System Settings</h3>
        <label style="font-size:12px;">เบอร์พร้อมเพย์:</label>
        <input type="text" id="set-pp">
        <button class="btn-os" style="background:#34C759;" onclick="updatePP()">Save Number</button>
        <hr style="margin:20px 0; opacity:0.1;">
        <label style="font-size:12px;">จัดการรายชื่อหมอ:</label>
        <input type="text" id="new-dr-name" placeholder="ชื่อหมอคนใหม่">
        <button class="btn-os" onclick="addDr()">Add Staff</button>
        <div id="manage-dr-list" style="margin-top:15px;"></div>
        <button onclick="openPage('home')" class="btn-os" style="background:#8E8E93;">กลับ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS3acLTKEmqAutw19YgnUfs3viIZwLNF0me2nfM9ck4KyJv-Ulk8DAb5m3G12FtVQeFA/exec";
    
    let currentUser = "", db = {};

    function handleAuth() {
        let u = document.getElementById('user-input').value.toLowerCase().trim(), p = document.getElementById('pass-input').value;
        if (p === '123456') {
            currentUser = (u === 'admin2') ? 'admin2' : 'admin';
            loadDB();
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('user-label').innerText = currentUser;
            document.getElementById('pp-label').innerText = db.pp;
            updateUI();
        } else alert('Password Error');
    }

    function loadDB() {
        let pf = currentUser + "_";
        db = {
            total: parseInt(localStorage.getItem(pf+'total')) || 0,
            queues: JSON.parse(localStorage.getItem(pf+'queues')) || [],
            wait: JSON.parse(localStorage.getItem(pf+'wait')) || [],
            history: JSON.parse(localStorage.getItem(pf+'history')) || [],
            doctors: JSON.parse(localStorage.getItem(pf+'doctors')) || [{n:"หมอนก", st:"free"}, {n:"หมอแมว", st:"free"}],
            pp: localStorage.getItem(pf+'pp') || (currentUser === 'admin2' ? '0812799119' : '0863526387')
        };
    }

    function save() {
        let pf = currentUser + "_";
        localStorage.setItem(pf+'total', db.total); localStorage.setItem(pf+'queues', JSON.stringify(db.queues));
        localStorage.setItem(pf+'wait', JSON.stringify(db.wait)); localStorage.setItem(pf+'history', JSON.stringify(db.history));
        localStorage.setItem(pf+'doctors', JSON.stringify(db.doctors)); localStorage.setItem(pf+'pp', db.pp);
    }

    function updateUI() { document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`; save(); }

    function openPage(id) {
        document.getElementById('home').style.display='none';
        document.querySelectorAll('.page').forEach(p=>p.style.display='none');
        document.getElementById(id).style.display='block';
        if(id==='p-dr-status') renderDrStatus();
        if(id==='p-queue') { renderQ(); populateDrSelect(); }
        if(id==='p-pay') updateDrop();
        if(id==='p-verify') renderV();
        if(id==='p-settings') { renderManageDr(); document.getElementById('set-pp').value = db.pp; }
        if(id==='p-summary') runSummary();
    }

    function renderDrStatus() {
        let l = document.getElementById('dr-status-list'); l.innerHTML = '';
        db.doctors.forEach((d, i) => {
            l.innerHTML += `<div class="dr-item" onclick="toggleDr(${i})"><strong>${d.n}</strong> <span class="status-badge ${d.st==='free'?'bg-free':'bg-busy'}">${d.st==='free'?'AVAILABLE':'BUSY'}</span></div>`;
        });
    }
    function toggleDr(i) { db.doctors[i].st = db.doctors[i].st === 'free' ? 'busy' : 'free'; save(); renderDrStatus(); }

    function populateDrSelect() {
        let s = document.getElementById('q-doctor-select'); s.innerHTML = '<option value="">-- เลือกหมอนวด --</option>';
        db.doctors.forEach(d => {
            s.innerHTML += `<option value="${d.n}" ${d.st==='busy'?'disabled':''}>${d.n}${d.st==='busy'?' (ไม่ว่าง)':''}</option>`;
        });
    }

    function addQ() {
        let n=document.getElementById('q-name').value, p=parseInt(document.getElementById('q-price').value), d=document.getElementById('q-date').value, t=document.getElementById('q-type').value, dr=document.getElementById('q-doctor-select').value;
        if(!n||!p||!d||!dr) return alert('Fill info!');
        let drIdx = db.doctors.findIndex(x => x.n === dr); db.doctors[drIdx].st = 'busy';
        db.queues.push({id:Date.now(), n, p, d, s:document.getElementById('q-s').value, e:document.getElementById('q-e').value, type:t, dr});
        save(); renderQ(); populateDrSelect();
    }
    function renderQ() {
        let l=document.getElementById('q-list'); l.innerHTML='<strong>คิวปัจจุบัน:</strong>';
        db.queues.forEach(q => l.innerHTML+=`<div class="list-item"><strong>${q.s}-${q.e} | ${q.n}</strong><br><small>${q.type} (หมอ${q.dr})</small><button onclick="delQ(${q.id}, '${q.dr}')" style="float:right; color:red; border:none; background:none;">X</button></div>`);
    }
    function delQ(id, drName) { 
        if(confirm('ลบ?')){
            let drIdx = db.doctors.findIndex(x => x.n === drName); if(drIdx !== -1) db.doctors[drIdx].st = 'free';
            db.queues=db.queues.filter(x=>x.id!==id); save(); renderQ();
        }
    }

    function updateDrop() {
        let s=document.getElementById('pay-select'); s.innerHTML='<option value="">-- เลือกคิวลูกค้า --</option>';
        db.queues.forEach(q=>s.innerHTML+=`<option value="${q.id}">${q.n}</option>`);
    }
    function autoPay() {
        let id=document.getElementById('pay-select').value; let q=db.queues.find(x=>x.id==id);
        if(q){document.getElementById('pay-name').value=q.n; document.getElementById('pay-amt').value=q.p; genQR();}
    }
    function genQR() {
        let a=document.getElementById('pay-amt').value;
        if(a>0){document.getElementById('qr-img').src=`https://promptpay.io/${db.pp}/${a}.png?t=${Date.now()}`; document.getElementById('pp-text').innerText=`เบอร์: ${db.pp}`; document.getElementById('qr-container').style.display='block';}
    }
    function submitPay() {
        let a=parseInt(document.getElementById('pay-amt').value), n=document.getElementById('pay-name').value, qId=document.getElementById('pay-select').value;
        if(!a||!n) return;
        let q = db.queues.find(x => x.id == qId);
        db.wait.push({id:Date.now(), a, n, type: q?q.type:'', dr: q?q.dr:''}); 
        if(qId) {
            let drIdx = db.doctors.findIndex(x => x.n === q.dr); if(drIdx !== -1) db.doctors[drIdx].st = 'free';
            db.queues = db.queues.filter(x => x.id != qId);
        }
        save(); openPage('home'); updateUI();
    }

    function renderV() {
        let l=document.getElementById('v-list'); l.innerHTML=db.wait.length?'':'<p style="text-align:center; opacity:0.5;">No items</p>';
        db.wait.forEach(v => l.innerHTML+=`<div class="list-item">฿${v.a} | ${v.n}<button onclick="confirmV(${v.id})" style="float:right; background:var(--os-gold); color:white; border:none; border-radius:12px; padding:6px 15px;">บันทึกสำเร็จ</button></div>`);
    }
    async function confirmV(id) {
        let v=db.wait.find(x=>x.id===id);
        let record={date:new Date().toLocaleDateString('th-TH'), time:new Date().toLocaleTimeString('th-TH'), n:v.n, type:v.type, dr:v.dr, a:v.a, user:currentUser, timestamp:new Date().getTime()};
        db.total+=v.a; db.history.push(record); db.wait=db.wait.filter(x=>x.id!==id);
        updateUI(); renderV();
        try { fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify([record])}); } catch(e){}
    }

    function updatePP() { let pp = document.getElementById('set-pp').value; if(pp){ db.pp = pp; updateUI(); alert('Saved!'); } }
    function addDr() { let n = document.getElementById('new-dr-name').value; if(n){ db.doctors.push({n, st:"free"}); save(); renderManageDr(); } }
    function renderManageDr() {
        let l = document.getElementById('manage-dr-list'); l.innerHTML = '';
        db.doctors.forEach((d, i) => l.innerHTML += `<div class="dr-item">${d.n} <button onclick="delDr(${i})" style="color:red; border:none; background:none;">ลบ</button></div>`);
    }
    function delDr(i) { db.doctors.splice(i, 1); save(); renderManageDr(); }
    function runSummary() {
        let now = new Date(), dSum=0;
        db.history.forEach(h => { if(new Date(h.timestamp).toDateString() === now.toDateString()) dSum += h.a; });
        document.getElementById('sum-day').innerText = `฿${dSum.toLocaleString()}`;
    }
    function resetToZero() { if(confirm('Reset?')){db.total=0; updateUI(); openPage('home');} }
</script>
</body>
</html>
