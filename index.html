<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประคบทอง Ultimate - OriginOS 6</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --os-bg: #F0F2F5; --os-card: rgba(255, 255, 255, 0.9); 
            --os-gold: #B8860B; --os-text: #1D1D1F;
            --main-color: var(--os-gold);
            --shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
        }
        
        body { font-family: 'Sarabun', sans-serif; background: var(--os-bg); margin: 0; transition: 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; margin: auto; }

        /* 🔘 Neumorphic Buttons (ไม่ใช่ปุ่มโง่ๆ) */
        .btn-neu { 
            background: var(--os-bg); border: none; padding: 15px; border-radius: 20px;
            box-shadow: var(--shadow); cursor: pointer; font-family: 'Kanit';
            color: var(--os-text); transition: 0.2s; font-weight: 600;
        }
        .btn-neu:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }
        .btn-gold { background: var(--main-color); color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        /* 🔒 Easy Login */
        #login-overlay { position: fixed; inset: 0; background: var(--os-bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-box { width: 80%; background: var(--os-bg); padding: 40px 20px; border-radius: 40px; box-shadow: var(--shadow); text-align: center; }

        /* 🏠 Home Cards */
        .balance-card { 
            background: var(--os-bg); padding: 30px 20px; border-radius: 40px; 
            box-shadow: var(--inner-shadow); text-align: center; margin-bottom: 25px; 
        }
        .balance-card h2 { font-family: 'Kanit'; font-size: 45px; margin: 5px 0; color: var(--main-color); }

        /* 🎚️ Switch UI (เหมือนสวิตช์ไฟ) */
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--os-bg); border-radius: 20px; margin-bottom: 10px; box-shadow: var(--shadow); }
        .switch { position: relative; width: 60px; height: 30px; appearance: none; background: #ddd; border-radius: 20px; outline: none; transition: 0.3s; cursor: pointer; }
        .switch:checked { background: var(--main-color); }
        .switch::before { content: ''; position: absolute; width: 26px; height: 26px; border-radius: 50%; top: 2px; left: 2px; background: white; transition: 0.3s; }
        .switch:checked::before { left: 32px; }

        /* 📄 Pages */
        .page { display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 🔢 NumPad Time (เครื่องคิดเลขเวลา) */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { padding: 20px; font-size: 20px; border-radius: 15px; background: var(--os-bg); box-shadow: var(--shadow); border: none; font-family: 'Kanit'; }

        /* 🎨 Theme Styles */
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; margin: 5px; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .logo-img { width: 80px; margin-bottom: 15px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>
<body onload="checkLogin()">

<div id="login-overlay">
    <div class="login-box">
        <img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-img">
        <h2 style="font-family:'Kanit'; color:var(--os-gold);">ประคบทอง ไทย/สปา</h2>
        <p style="font-size: 12px; opacity: 0.6;">ระบบล็อกอินอัจฉริยะ</p>
        <input type="password" id="pass-input" placeholder="รหัสผ่าน" style="width:80%; padding:15px; border-radius:15px; border:none; box-shadow: var(--inner-shadow); outline:none; text-align:center;">
        <button class="btn-neu btn-gold" style="width:80%; margin-top:20px;" onclick="handleAuth()">ปลดล็อกระบบ</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="home">
        <div style="text-align:center;"><img src="https://img2.pic.in.th/image-removebg-preview3aa3c214982fe6cd.png" class="logo-img"></div>
        <div class="balance-card">
            <small>ยอดรายได้วันนี้</small>
            <h2 id="total-val">฿0</h2>
        </div>
        <div class="menu-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <button class="btn-neu" onclick="openPage('p-dr-status')">👨‍⚕️ สถานะหมอ</button>
            <button class="btn-neu" onclick="openPage('p-queue')">📅 จองนวด</button>
            <button class="btn-neu" onclick="openPage('p-pay')">💰 รับเงิน</button>
            <button class="btn-neu" onclick="openPage('p-history')">📜 ประวัติงาน</button>
            <button class="btn-neu" onclick="openPage('p-verify')">🔍 ลงชีท</button>
            <button class="btn-neu" onclick="openPage('p-settings')">⚙️ ตั้งค่า</button>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:#AAA; width:100%; margin-top:40px; cursor:pointer;">ออกจากระบบ</button>
    </div>

    <div id="p-dr-status" class="page">
        <h3 style="font-family:'Kanit';">สถานะสวิตช์ไฟหมอ</h3>
        <div id="dr-switch-list"></div>
        <button class="btn-neu btn-gold" style="width:100%; margin-top:20px;" onclick="openPage('home')">กลับ</button>
    </div>

    <div id="p-queue" class="page">
        <h3>ลงคิวจองนวด</h3>
        <input type="text" id="q-name" placeholder="ชื่อลูกค้า" class="btn-neu" style="width:100%; text-align:left; background:white;">
        <select id="q-dr-select" class="btn-neu" style="width:100%; margin-top:10px;"></select>
        
        <p style="margin-top:15px; font-size:13px;">🕒 <b>กรอกเวลาเริ่ม (เช่น 1230):</b></p>
        <input type="text" id="time-input" readonly class="btn-neu" style="width:100%; font-size:24px; text-align:center; color:var(--main-color);">
        
        <div class="numpad">
            <button class="num-btn" onclick="pressNum('1')">1</button>
            <button class="num-btn" onclick="pressNum('2')">2</button>
            <button class="num-btn" onclick="pressNum('3')">3</button>
            <button class="num-btn" onclick="pressNum('4')">4</button>
            <button class="num-btn" onclick="pressNum('5')">5</button>
            <button class="num-btn" onclick="pressNum('6')">6</button>
            <button class="num-btn" onclick="pressNum('7')">7</button>
            <button class="num-btn" onclick="pressNum('8')">8</button>
            <button class="num-btn" onclick="pressNum('9')">9</button>
            <button class="num-btn" style="color:red" onclick="pressNum('C')">C</button>
            <button class="num-btn" onclick="pressNum('0')">0</button>
            <button class="num-btn" style="color:green" onclick="addQ()">OK</button>
        </div>
        <button class="btn-neu" style="width:100%; margin-top:15px;" onclick="openPage('home')">ยกเลิก</button>
    </div>

    <div id="p-history" class="page">
        <h3>ประวัติการนวดวันนี้</h3>
        <div id="history-list"></div>
        <button class="btn-neu btn-gold" style="width:100%; margin-top:20px;" onclick="openPage('home')">กลับ</button>
    </div>

    <div id="p-settings" class="page">
        <h3>ตั้งค่าระบบ</h3>
        <p>เลือกโทนสีแอป:</p>
        <div class="theme-dot" style="background:#B8860B" onclick="setTheme('#B8860B')"></div>
        <div class="theme-dot" style="background:#2196F3" onclick="setTheme('#2196F3')"></div>
        <div class="theme-dot" style="background:#4CAF50" onclick="setTheme('#4CAF50')"></div>
        <div class="theme-dot" style="background:#E91E63" onclick="setTheme('#E91E63')"></div>
        <div class="theme-dot" style="background:#333333" onclick="setTheme('#333333')"></div>
        <hr>
        <button class="btn-neu danger-btn" onclick="resetAllData()" style="width:100%; color:red;">ล้างข้อมูลทั้งหมด</button>
        <button class="btn-neu" style="width:100%; margin-top:20px;" onclick="openPage('home')">กลับ</button>
    </div>

    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS3acLTKEmqAutw19YgnUfs3viIZwLNF0me2nfM9ck4KyJv-Ulk8DAb5m3G12FtVQeFA/exec";
    let db = { total:0, queues:[], doctors:[{n:"หมอไก่", st:"free"}], history:[], theme:'#B8860B', pp:'0863526387' };
    let timeBuffer = "";

    function checkLogin() {
        if(localStorage.getItem('isLogged') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initApp();
        }
    }

    function handleAuth() {
        if(document.getElementById('pass-input').value === '123456') {
            localStorage.setItem('isLogged', 'true');
            location.reload();
        } else alert('รหัสผิดเพื่อน!');
    }

    function logout() { localStorage.removeItem('isLogged'); location.reload(); }

    function initApp() {
        let saved = localStorage.getItem('prakobthong_db');
        if(saved) db = JSON.parse(saved);
        setTheme(db.theme || '#B8860B');
        updateUI();
    }

    function setTheme(color) {
        db.theme = color;
        document.documentElement.style.setProperty('--main-color', color);
        document.documentElement.style.setProperty('--os-gold', color);
        save();
    }

    function openPage(id) {
        document.getElementById('home').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'p-dr-status') renderDrSwitch();
        if(id === 'p-queue') { populateDrSelect(); timeBuffer = ""; updateTimeDisplay(); }
        if(id === 'p-history') renderHistory();
    }

    // 🔢 NumPad Logic
    function pressNum(n) {
        if(n === 'C') timeBuffer = "";
        else if(timeBuffer.length < 4) timeBuffer += n;
        updateTimeDisplay();
    }
    function updateTimeDisplay() {
        let formatted = timeBuffer.padEnd(4, '_');
        document.getElementById('time-input').value = formatted.substring(0,2) + ":" + formatted.substring(2,4);
    }

    // 🕒 Smart Time Check (กันเวลาถอยหลัง)
    function validateTime(inputTime) {
        let now = new Date();
        let currentH = now.getHours();
        let currentM = now.getMinutes();
        let inH = parseInt(inputTime.substring(0,2));
        let inM = parseInt(inputTime.substring(2,4));

        if(inH > 23 || inM > 59) return {ok:false, msg:"เวลาเพี้ยนแล้วมึง!"};
        if(inH < currentH || (inH === currentH && inM < currentM)) {
            return {ok:false, msg:"มึงเลือกเวลาในอดีตไม่ได้!"};
        }
        return {ok:true};
    }

    function addQ() {
        let name = document.getElementById('q-name').value;
        let dr = document.getElementById('q-dr-select').value;
        let timeCheck = validateTime(timeBuffer);

        if(!name || !dr || timeBuffer.length < 4) return alert('กรอกให้ครบ!');
        if(!timeCheck.ok) return alert(timeCheck.msg);

        let newQ = { id:Date.now(), name, dr, time:document.getElementById('time-input').value };
        db.queues.push(newQ);
        // Toggle Dr Status
        let idx = db.doctors.findIndex(d => d.n === dr);
        db.doctors[idx].st = 'busy';
        
        save();
        alert('จองสำเร็จ!');
        openPage('home');
    }

    function renderDrSwitch() {
        let list = document.getElementById('dr-switch-list');
        list.innerHTML = "";
        db.doctors.forEach((d, i) => {
            list.innerHTML += `
                <div class="switch-container">
                    <strong>${d.n}</strong>
                    <input type="checkbox" class="switch" ${d.st==='busy'?'checked':''} onchange="toggleDrStatus(${i})">
                </div>
            `;
        });
    }
    function toggleDrStatus(i) {
        db.doctors[i].st = db.doctors[i].st === 'free' ? 'busy' : 'free';
        save();
    }

    function renderHistory() {
        let list = document.getElementById('history-list');
        list.innerHTML = db.history.length ? "" : "ไม่มีประวัติวันนี้";
        db.history.forEach(h => {
            list.innerHTML += `
                <div class="switch-container" style="flex-direction:column; align-items:flex-start;">
                    <div style="width:100%; display:flex; justify-content:space-between;">
                        <b>${h.n}</b> <span style="color:var(--main-color)">฿${h.a}</span>
                    </div>
                    <small>🕒 ${h.time} | 👨‍⚕️ ${h.dr} | 👤 โดย: ${h.user}</small>
                </div>
            `;
        });
    }

    function populateDrSelect() {
        let s = document.getElementById('q-dr-select');
        s.innerHTML = db.doctors.map(d => `<option value="${d.n}" ${d.st==='busy'?'disabled':''}>${d.n} ${d.st==='busy'?'(ไม่ว่าง)':''}</option>`).join('');
    }

    function save() { localStorage.setItem('prakobthong_db', JSON.stringify(db)); updateUI(); }
    function updateUI() { document.getElementById('total-val').innerText = `฿${db.total.toLocaleString()}`; }
    function resetAllData() { if(confirm('จะล้างจริงดิ? หายหมดเลยนะ!')) { localStorage.removeItem('prakobthong_db'); location.reload(); } }
</script>
</body>
</html>
